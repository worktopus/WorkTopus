<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/login.css">
    <title>login</title>
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <a href="/templates/home/index.html" class="login-logo">
            <img src="/images/logo.png" alt="WorkTopus logo" class="login-logo-img">
            <span class="login-logo-text">WorkTopus</span>
        </a>

        <h1 class="login-title">로그인</h1>
        <p class="login-desc">WorkTopus에서 팀 프로젝트를 시작하세요.</p>

        <p class="login-msg" th:if="${msg}" th:text="${msg}"></p>
        <p class="login-error" th:if="${param.error}">아이디 또는 비밀번호가 올바르지 않습니다.</p>
        <p class="login-msg" th:if="${param.logout}">로그아웃되었습니다.</p>

        <form th:action="@{/login}" method="post" class="login-form">
            <label class="login-label" for="username">아이디</label>
            <input class="login-input" type="text" id="username" name="username" placeholder="아이디를 입력하세요" autofocus required>

            <label class="login-label" for="password">비밀번호</label>
            <input class="login-input" type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>

            <button class="login-submit" type="submit">로그인</button>
        </form>

        <div class="login-divider">
            <span class="login-divider-line"></span>
            <span class="login-divider-text">또는</span>
            <span class="login-divider-line"></span>
        </div>

        <div class="social-login">
            <a href="/oauth2/authorization/google" class="social-btn google-btn">
                <svg class="social-icon" viewBox="0 0 48 48" aria-hidden="true">
                    <path fill="#EA4335" d="M24 9.5c3.4 0 6.4 1.2 8.8 3.5l6.6-6.6C35.4 2.7 30.1.5 24 .5 14.6.5 6.5 5.9 2.6 13.8l7.7 6C12.1 13.8 17.6 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.6h12.7c-.6 2.9-2.2 5.4-4.7 7.1l7.3 5.7c4.3-4 7.2-9.9 7.2-16.9z"/>
                    <path fill="#FBBC05" d="M10.3 28.2c-.5-1.5-.8-3-.8-4.7s.3-3.2.8-4.7l-7.7-6C1 16.1.1 19.7.1 23.5s.9 7.4 2.5 10.7l7.7-6z"/>
                    <path fill="#34A853" d="M24 46.5c6.1 0 11.3-2 15.1-5.5l-7.3-5.7c-2 1.3-4.6 2.1-7.8 2.1-6.4 0-11.9-4.3-13.7-10.1l-7.7 6C6.5 41.1 14.6 46.5 24 46.5z"/>
                </svg>
                <span>Google로 로그인</span>
            </a>

            <a href="/oauth2/authorization/kakao" class="social-btn kakao-btn">
                <svg class="social-icon" viewBox="0 0 40 40" aria-hidden="true">
                    <path fill="#191919" d="M20 7C11.7 7 5 12.2 5 18.7c0 4.1 2.7 7.7 6.8 9.8l-1.4 5.1c-.1.4.4.7.7.5l6-4c.9.1 1.9.2 2.9.2 8.3 0 15-5.2 15-11.7S28.3 7 20 7z"/>
                </svg>
                <span>카카오로 로그인</span>
            </a>
        </div>

        <div class="login-links">
            <a href="/home/register" class="login-link">회원가입</a>
            <span class="login-link-bar">|</span>
            <a href="/" class="login-link">홈으로</a>
        </div>

    </div>
</div>
</body>
</html>
