<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>

    <meta name="_csrf"
          th:content="${_csrf.token}">

    <meta name="_csrf_header"
          th:content="${_csrf.headerName}">

    <link rel="stylesheet"
          as="style"
          crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/register.css">
</head>
<body>
<div class="register-page">
    <div class="register-card">

        <a href="/" class="register-logo">
            <img src="/images/logo.png"
                 alt="WorkTopus logo"
                 class="register-logo-img">

            <span class="register-logo-text">WorkTopus</span>
        </a>

        <h1 class="register-title">회원가입</h1>

        <p class="register-desc">
            WorkTopus에서 팀 프로젝트를 시작하세요.
        </p>

        <form th:action="@{/home/register}"
              method="post"
              th:object="${userForm}"
              class="register-form"
              id="registerForm">

            <div class="register-error"
                 th:if="${#fields.hasGlobalErrors()}"
                 th:each="err : ${#fields.globalErrors()}"
                 th:text="${err}">
            </div>

            <!-- 아이디 -->
            <label class="register-label" for="userId">
                아이디
            </label>

            <div class="register-input-row">
                <input class="register-input register-row-input"
                       type="text"
                       th:field="*{userId}"
                       id="userId"
                       placeholder="4~30자"
                       autocomplete="username"
                       required>

                <button class="register-check-btn"
                        type="button"
                        id="checkUserIdButton">
                    중복확인
                </button>
            </div>

            <p class="register-result"
               id="userIdResult">
            </p>

            <span class="register-error-text"
                  th:errors="*{userId}">
            </span>

            <!-- 비밀번호 -->
            <label class="register-label" for="password">
                비밀번호
            </label>

            <input class="register-input"
                   type="password"
                   th:field="*{password}"
                   id="password"
                   placeholder="4자 이상"
                   autocomplete="new-password"
                   required>

            <span class="register-error-text"
                  th:errors="*{password}">
            </span>

            <!-- 이름 -->
            <label class="register-label" for="name">
                이름
            </label>

            <input class="register-input"
                   type="text"
                   th:field="*{name}"
                   id="name"
                   placeholder="이름을 입력하세요"
                   required>

            <span class="register-error-text"
                  th:errors="*{name}">
            </span>

            <!-- 이메일 -->
            <label class="register-label" for="email">
                이메일
            </label>

            <div class="register-input-row">
                <input class="register-input register-row-input"
                       type="email"
                       th:field="*{email}"
                       id="email"
                       placeholder="example@email.com"
                       autocomplete="email"
                       required>

                <button class="register-check-btn"
                        type="button"
                        id="sendEmailCodeButton">
                    인증번호 발송
                </button>
            </div>

            <span class="register-error-text"
                  th:errors="*{email}">
            </span>

            <!-- 이메일 인증번호 -->
            <div class="email-verification-box">
                <label class="register-label"
                       for="emailVerificationCode">
                    인증번호
                </label>

                <div class="register-input-row">
                    <input class="register-input register-row-input"
                           type="text"
                           id="emailVerificationCode"
                           name="emailVerificationCode"
                           maxlength="6"
                           inputmode="numeric"
                           placeholder="6자리 인증번호">

                    <button class="register-check-btn"
                            type="button"
                            id="verifyEmailCodeButton">
                        인증확인
                    </button>
                </div>

                <p class="register-result"
                   id="emailVerificationResult">
                </p>
            </div>

            <button class="register-submit"
                    type="submit">
                가입하기
            </button>
        </form>

        <div class="register-links">
            <a href="/login" class="register-link">
                로그인으로
            </a>

            <span class="register-link-bar">|</span>

            <a href="/" class="register-link">
                홈으로
            </a>
        </div>
    </div>
</div>

<script src="/js/register.js"></script>
</body>
</html>
