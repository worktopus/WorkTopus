<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/index.css">

    <title>WorkTopus</title>
</head>

<body>

<main>

    <header>
        <div class="logo">
            <img src="/images/logo.png" alt="WorkTopus 로고">
            <h1>WorkTopus</h1>
        </div>

        <div class="buttons">
            <a href="/login">로그인</a>
            <a href="/home/register">회원가입</a>
        </div>
    </header>


    <!-- 기존 히어로 그대로 -->
    <section class="hero">
        <div class="go">
            <h2>
                Work Smarter,<br>
                <span>Together.</span>
            </h2>

            <a href="/login">시작하기 →</a>
        </div>
    </section>

    <!--프로젝트 시작-->
    <section class="project">
        <h2>프로젝트는 시작하기 쉽게.</h2>

        <div class="project-wrap">
            <div class="project-small"></div>

            <ul class="project-list">
                <li>✓ 팀원 초대</li>
                <li>✓ 역할 지정</li>
                <li>✓ 공개·비공개 설정</li>
                <li>✓ 프로젝트 관리</li>
            </ul>

            <div class="project-large"></div>
        </div>
    </section>


    <section class="work">
        <div class="work-wrap">
            <div class="work-left"></div>
            <div class="work-center"></div>

            <div class="work-text">
                <p>
                    해야 할 일,<br>
                    진행 중인 업무,<br>
                    완료된 업무를 구분하여<br>
                    팀의 진행 상황을 한눈에 확인할 수 있습니다.
                </p>

                <strong>
                    업무의 우선순위를 놓치지 않도록<br>
                    한 화면에 담았습니다.
                </strong>

                <h2>해야 할 일은 한눈에.</h2>
            </div>
        </div>
    </section>


    <section class="chat">
        <div class="chat-wrap">
            <div class="chat-left"></div>

            <h2>대화도 업무의 일부니까.</h2>

            <div class="chat-right"></div>
        </div>
    </section>


    <section class="cards">
        <div class="cards-wrap">
            <article class="card">
                <div class="card-box"></div>
                <p>회의는 기록까지 자동으로.</p>
            </article>

            <article class="card">
                <div class="card-box"></div>
                <p>일정을 놓치지 않도록.</p>
            </article>

            <article class="card">
                <div class="card-box"></div>
                <p>문서는 흩어지지 않게.</p>
            </article>
        </div>
    </section>

</main>

</body>
</html>
