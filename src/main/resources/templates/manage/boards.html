<!DOCTYPE html>
<html lang="ko" xmlns:th="http://thymeleaf.org">
<div th:fragment="workspaceBoards">
    <div class="content-header">
        <h3>📋 프로젝트 게시판 관리 및 통계</h3>
        <p>게시판의 활성화 상태를 제어하고, 버튼을 클릭해 하단으로 글 목록을 펼쳐 확인합니다.</p>
    </div>

    <!-- 미니멀 대시보드 데이터 통계 지표 카드 영역 -->
    <div class="board-summary-cards" style="display: flex; gap: 16px; margin-top: 20px; margin-bottom: 24px;">
        <div class="summary-card" style="flex: 1; padding: 16px; background: #f8f9fa; border: 1px solid var(--border); border-radius: var(--radius-sm);">
            <div style="font-size: 0.85rem; color: var(--text-sub); font-weight: 600;">📢 총 공지사항 수</div>
            <div style="font-size: 1.5rem; font-weight: 700; margin: 8px 0; color: var(--primary);">4개</div>
            <div style="font-size: 0.75rem; color: #6c757d;">최근 작성자: <span style="font-weight: 600; color: #333;">김여진</span> (2시간 전)</div>
        </div>
        <div class="summary-card" style="flex: 1; padding: 16px; background: #f8f9fa; border: 1px solid var(--border); border-radius: var(--radius-sm);">
            <div style="font-size: 0.85rem; color: var(--text-sub); font-weight: 600;">💬 총 자유게시글 수</div>
            <div style="font-size: 1.5rem; font-weight: 700; margin: 8px 0; color: #28a745;">32개</div>
            <div style="font-size: 0.75rem; color: #6c757d;">최근 작성자: <span style="font-weight: 600; color: #333;">신승민</span> (10분 전)</div>
        </div>
    </div>

    <!-- 게시판 관리 테이블 인터페이스 (아코디언 토글형 구조) -->
    <div class="board-management-wrapper" style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
            <tr style="border-bottom: 2px solid var(--border); color: var(--text-main); font-size: 0.9rem;">
                <th style="padding: 14px 16px; font-weight: 600;">게시판 이름</th>
                <th style="padding: 14px 16px; font-weight: 600;">생성일</th>
                <th style="padding: 14px 16px; font-weight: 600; text-align: center;">활성화 상태</th>
                <th style="padding: 14px 16px; font-weight: 600; text-align: center;">세부 기능</th>
            </tr>
            </thead>
            <tbody>

            <!-- 공지사항 원본 Row -->
            <tr style="border-bottom: 1px solid var(--border);" class="board-item-row" id="board-row-NOTICE">
                <td style="padding: 16px;"><span style="font-weight: 600; color: var(--text-main);">📢 공지사항</span></td>
                <td style="padding: 16px; color: var(--text-sub); font-size: 0.9rem;">2026-07-01</td>
                <td style="padding: 16px; text-align: center;">
                    <label class="switch">
                        <input type="checkbox" class="board-toggle-switch" data-board-id="1" checked>
                        <span class="slider round"></span>
                    </label>
                </td>
                <td style="padding: 16px; text-align: center;">
                    <button type="button" class="btn btn-secondary-outline inspect-board-btn" data-board-type="NOTICE" style="padding: 6px 12px; font-size: 0.8rem; cursor: pointer;">글 목록 열기</button>
                </td>
            </tr>
            <!-- 📢 공지사항 클릭 시 아래로 열릴 히든 아코디언 컨테이너 구역 -->
            <tr id="details-NOTICE" style="display: none; background-color: #fafafa;">
                <td colspan="4" style="padding: 20px 24px; border-bottom: 1px solid var(--border);">
                    <div class="accordion-list-wrapper" style="display: flex; flex-direction: column; gap: 10px;">
                        <!-- JS가 실시간으로 이곳에 글 목록 피드를 깨끗하게 채워 넣습니다 -->
                    </div>
                </td>
            </tr>

            <!-- 자유게시판 원본 Row -->
            <tr style="border-bottom: 1px solid var(--border);" class="board-item-row" id="board-row-FREE">
                <td style="padding: 16px;"><span style="font-weight: 600; color: var(--text-main);">💬 자유게시판</span></td>
                <td style="padding: 16px; color: var(--text-sub); font-size: 0.9rem;">2026-07-01</td>
                <td style="padding: 16px; text-align: center;">
                    <label class="switch">
                        <input type="checkbox" class="board-toggle-switch" data-board-id="2" checked>
                        <span class="slider round"></span>
                    </label>
                </td>
                <td style="padding: 16px; text-align: center;">
                    <button type="button" class="btn btn-secondary-outline inspect-board-btn" data-board-type="FREE" style="padding: 6px 12px; font-size: 0.8rem; cursor: pointer;">글 목록 열기</button>
                </td>
            </tr>
            <!-- 💬 자유게시판 클릭 시 아래로 열릴 히든 아코디언 컨테이너 구역 -->
            <tr id="details-FREE" style="display: none; background-color: #fafafa;">
                <td colspan="4" style="padding: 20px 24px; border-bottom: 1px solid var(--border);">
                    <div class="accordion-list-wrapper" style="display: flex; flex-direction: column; gap: 10px;">
                        <!-- JS가 실시간으로 이곳에 글 목록 피드를 깨끗하게 채워 넣습니다 -->
                    </div>
                </td>
            </tr>

            </tbody>
        </table>
    </div>
</div>
</html>
