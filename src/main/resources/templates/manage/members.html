<!DOCTYPE html>
<html lang="ko" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Worktopus - 팀원 관리</title>
    <!-- 공통 및 레이아웃 CSS 로드 -->
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/manage.css}">
</head>
<body>
<div class="layout">
    <!-- 1. 왼쪽 사이드바 영역 연동 -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- 2. 오른쪽 메인 콘텐츠 영역 -->
    <div class="layout__content">
        <!-- 공통 헤더 바 연결 -->
        <div th:replace="~{fragments/header :: header}"></div>

        <!-- 실제 관리 폼 메인 페이지 -->
        <main class="manage-container" style="padding: 40px; width: 100%;">
            <h1 class="manage-title" style="font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; color: var(--text-main);">
                프로젝트 관리 (팀장 전용)
            </h1>

            <!-- 상단 탭 메뉴 바 (현재 페이지는 팀원 관리가 활성화됨) -->
            <div class="manage-tabs">
                <button class="tab-btn" th:onclick="|location.href='/projects/manage/' + ${projectId}|">일반 관리</button>
                <button class="tab-btn active" th:onclick="|location.href='/projects/manage/' + ${projectId} + '/members'|">팀원 관리</button>
                <button class="tab-btn" th:onclick="|location.href='/projects/manage/' + ${projectId} + '/invite'|">팀원 초대</button>
                <button class="tab-btn" th:onclick="|location.href='/projects/manage/' + ${projectId} + '/boards'|">게시판 관리</button>
            </div>

            <!-- [탭 2] 팀원 및 역할 관리 구역 (디자인 박스 감싸기) -->
            <div id="member-tab" class="tab-content active" style="display: block; margin-top: 24px;">
                <!-- 팀원들이 작성한 fragment 조립 코드를 이 내부 레이아웃 안에 안착시킵니다 -->
                <div th:fragment="workspaceMembers">
                    <div class="content-header" style="margin-bottom: 20px;">
                        <h3>👥 팀원 및 역할 관리</h3>
                        <p style="font-size: 0.85rem; color: var(--text-sub);">현재 참여 중인 팀원의 목록을 확인하고 역할을 제어합니다.</p>
                    </div>

                    <!-- 현재 캡처화면에 보이는 팀원 리스트 테이블 마크업 구역 시작 -->
                    <div class="members-table-wrapper" style="background: #fff; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 20px;">
                        <!-- 기존에 깨져서 나오던 테이블이나 리스트 태그 코드가 이 자리에 그대로 유지되면 됩니다 -->
                        <table style="width: 100%; border-collapse: collapse; text-align: left;">
                            <thead>
                            <tr style="border-bottom: 2px solid var(--border); color: var(--text-sub); font-size: 0.9rem;">
                                <th style="padding: 12px 8px;">팀원 정보</th>
                                <th style="padding: 12px 8px;">현재 직급</th>
                                <th style="padding: 12px 8px;">직급 변경</th>
                                <th style="padding: 12px 8px;">담당 역할</th>
                                <th style="padding: 12px 8px; text-align: center;">제외</th>
                            </tr>
                            </thead>
                            <tbody>
                            <!-- 데이터 바인딩 루프 구역 -->
                            <tr th:each="member : ${members}" style="border-bottom: 1px solid var(--border);">
                                <td style="padding: 12px 8px;" th:text="${member.name}">홍길동</td>
                                <td style="padding: 12px 8px;" th:text="${member.role}">팀원</td>
                                <td style="padding: 12px 8px;">
                                    <!-- 직급 변경 셀렉트 박스 등 -->
                                </td>
                                <td style="padding: 12px 8px;">
                                    <!-- 담당 역할 프로필 연동 구역 -->
                                </td>
                                <td style="padding: 12px 8px; text-align: center;">
                                    <button class="btn btn-danger-sm" style="color: var(--danger); background: none; border: none; cursor: pointer;">제외</button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(members)}">
                                <td colspan="5" style="text-align: center; padding: 40px; color: var(--text-sub);">팀원이 없습니다.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- 테이블 마크업 구역 끝 -->
                </div>
            </div>
        </main>
    </div>
</div>

<!-- 스크립트 바인딩 -->
<script th:src="@{/js/manage/project-manage.js}"></script>
<script th:src="@{/js/manage/manage-member.js}"></script>
</body>
</html>
