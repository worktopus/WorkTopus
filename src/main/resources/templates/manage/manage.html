<!DOCTYPE html>
<html lang="ko" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Worktopus - 프로젝트 관리</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/manage.css}">
</head>
<body>
<div class="layout">
    <!-- 1. 왼쪽 사이드바 영역 연동 -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- 2. 오른쪽 메인 콘텐츠 영역 -->
    <div class="layout__content">
        <!-- 공통 헤더 바 연결 -->
        <div th:replace="~{fragments/header :: header}"></div>

        <!-- 실제 관리 폼 메인 페이지 -->
        <main class="manage-container" style="padding: 40px; width: 100%;">
            <h1 class="manage-title" style="font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; color: var(--text-main);">
                프로젝트 관리 (팀장 전용)
            </h1>

            <!-- 상단 탭 바 동적 ID 파이프라인 -->
            <div class="manage-tabs">
                <button class="tab-btn active" th:onclick="|location.href='/projects/manage/' + ${projectId}|">일반 관리</button>
                <button class="tab-btn" th:onclick="|location.href='/projects/manage/' + ${projectId} + '/members'|">팀원 관리</button>
                <button class="tab-btn" th:onclick="|location.href='/projects/manage/' + ${projectId} + '/invite'|">팀원 초대</button>
                <button class="tab-btn" th:onclick="|location.href='/projects/manage/' + ${projectId} + '/boards'|">게시판 관리</button>
            </div>

            <!-- [탭 1] 프로젝트 일반 관리 구역 -->
            <div id="general-tab" class="tab-content active" style="display: block;">
                <div class="content-header">
                    <h3>🔧 프로젝트 일반 관리</h3>
                    <p>프로젝트의 기본 정보(이름, 내용)를 개별적으로 수정하고 안전하게 반영합니다.</p>
                </div>

                <!-- 1️⃣ [독립 폼] 프로젝트 이름 변경 구역 -->
                <div class="manage-section" style="background-color: #fff; padding: 24px; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 24px;">
                    <!-- 📌 비동기 JS 핸들링을 위해 id="updateNameForm"을 부여하고 action은 제거했습니다. -->
                    <form id="updateNameForm" class="manage-form">
                        <input type="hidden" name="_csrf" th:value="${_csrf != null} ? ${_csrf.token} : ''"/>
                        <input type="hidden" name="projectId" th:value="${projectId}"/>

                        <div class="form-group">
                            <label for="projectName" class="form-label" style="font-weight: 600; display: block; margin-bottom: 8px;">프로젝트 이름 변경</label>
                            <!-- 📌 DTO의 이름 매핑 필드와 일치하도록 name="workspaceName"으로 수정했습니다. -->
                            <input type="text" id="projectName" name="workspaceName" class="form-input" placeholder="새로운 프로젝트명을 입력하세요" th:value="${project != null} ? ${project.name} : 'Worktopus'" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);">
                        </div>
                        <div class="form-actions" style="margin-top: 16px; text-align: right;">
                            <button type="submit" class="btn btn-primary" style="background-color: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; font-weight: 500;">이름 변경 저장</button>
                        </div>
                    </form>
                </div>

                <!-- 2️⃣ [독립 폼] 프로젝트 내용(설명) 변경 구역 -->
                <div class="manage-section" style="background-color: #fff; padding: 24px; border: 1px solid var(--border); border-radius: var(--radius-sm);">
                    <!-- 📌 비동기 JS 핸들링을 위해 id="updateDescForm"을 부여하고 action은 제거했습니다. -->
                    <form id="updateDescForm" class="manage-form">
                        <input type="hidden" name="_csrf" th:value="${_csrf != null} ? ${_csrf.token} : ''"/>
                        <input type="hidden" name="projectId" th:value="${projectId}"/>

                        <div class="form-group">
                            <label for="projectDescription" class="form-label" style="font-weight: 600; display: block; margin-bottom: 8px;">프로젝트 내용(설명) 변경</label>
                            <!-- 📌 DTO의 내용 매핑 필드와 일치하도록 name="projectDescription"으로 수정했습니다. -->
                            <textarea id="projectDescription" name="projectDescription" class="form-input" rows="5" placeholder="프로젝트에 대한 상세 설명을 입력하세요" th:text="${project != null} ? ${project.description} : ''" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); resize: vertical; font-family: inherit;"></textarea>
                        </div>
                        <div class="form-actions" style="margin-top: 16px; text-align: right;">
                            <button type="submit" class="btn btn-primary" style="background-color: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; font-weight: 500;">내용 변경 저장</button>
                        </div>
                    </form>
                </div>

            </div>
        </main>
    </div>
</div>

<!-- 필요한 자바스크립트 스크립트 모음 -->
<script th:src="@{/js/manage/project-manage.js}"></script>
<script th:src="@{/js/manage/manage-general.js}"></script>
</body>
</html>
