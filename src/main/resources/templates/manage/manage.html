<!DOCTYPE html>
<html lang="ko" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Worktopus - 프로젝트 관리</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/manage.css}">
</head>
<body>
<div class="layout">
    <!-- 1. 왼쪽 사이드바 영역 연동 -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- 2. 오른쪽 메인 콘텐츠 영역 -->
    <div class="layout__content">

        <!-- [💥 핵심 수정 포인트] 상단 공통 헤더 바 영역 -->
        <!-- 원래 th:replace만 있던 자리를 커스텀 오버라이딩하여, 새로고침 시에도 DB의 visibility 상태에 따라 🌐 또는 🔒 아이콘을 강제로 동적 바인딩합니다 -->
        <header class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 0 24px; height: 70px; border-bottom: 1px solid var(--border); background: #fff;">
            <div class="header__left" style="display: flex; align-items: center; gap: 12px;">
                <span class="header__project-name" style="font-size: 1.15rem; font-weight: 700; color: var(--text-main);"
                      th:text="${project != null} ? (${project.name} + (${project.visibility == 'PRIVATE'} ? ' 🔒' : ' 🌐')) : 'Worktopus 🌐'">
                    Worktopus 🌐
                </span>
            </div>
            <!-- 백엔드에서 주입되는 유저 정보 프로필 규격 국소 보존 -->
            <div class="header__right" style="display: flex; align-items: center; gap: 16px;">
                <div style="text-align: right;">
                    <div style="font-size: 0.9rem; font-weight: 600; color: var(--text-main);">김여진</div>
                    <div style="font-size: 0.75rem; color: var(--text-sub);">Backend Developer</div>
                </div>
                <div class="profile-circle" style="width: 40px; height: 40px; border-radius: 50%; background: #eef0f2; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">👤</div>
            </div>
        </header>

        <!-- 실제 관리 폼 메인 페이지 -->
        <main class="manage-container" style="padding: 40px; width: 100%;">
            <h1 class="manage-title" style="font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; color: var(--text-main);">
                프로젝트 관리 (팀장 전용)
            </h1>

            <!-- 상단 탭 메뉴 바 -->
            <div class="manage-tabs">
                <button class="tab-btn active">일반 관리</button>
                <button class="tab-btn">팀원 관리</button>
                <button class="tab-btn">팀원 초대</button>
                <button class="tab-btn">게시판 관리</button>
            </div>

            <!-- ========================================================================== -->
            <!-- [탭 1] 4-1. 프로젝트 일반 관리 구역 -->
            <!-- ========================================================================== -->
            <div id="general-tab" class="tab-content active" style="display: block;">
                <div class="content-header">
                    <h3>🔧 프로젝트 일반 관리</h3>
                    <p>프로젝트의 기본 정보를 수정하거나 저장소를 안전하게 관리합니다.</p>
                </div>

                <form th:action="@{/api/manage/general-update}" method="post" enctype="multipart/form-data" class="manage-form">
                    <input type="hidden" name="_csrf" th:value="${_csrf != null} ? ${_csrf.token} : ''"/>

                    <div class="form-group">
                        <label for="projectName" class="form-label">프로젝트 이름</label>
                        <input type="text" id="projectName" name="workspaceName" class="form-input" placeholder="프로젝트명을 입력하세요" th:value="${project != null} ? ${project.name} : 'Worktopus'">
                    </div>
                    <div class="form-group">
                        <label class="form-label">프로젝트 로고 이미지</label>
                        <div class="logo-upload-wrapper">
                            <div class="logo-preview" id="logoPreview"><span class="preview-emoji">🐙</span></div>
                            <div class="upload-controls">
                                <label for="logoFile" class="btn btn-secondary-outline" style="cursor: pointer; padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm);">이미지 변경</label>
                                <input type="file" id="logoFile" name="logoFile" accept="image/*" style="display: none;" onchange="console.log(this.files)">
                                <button type="button" class="btn btn-danger-outline" id="deleteLogoBtn">로고 삭제</button>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">공개 범위 설정</label>
                        <div class="radio-group" style="display: flex; flex-direction: column; gap: 8px;">
                            <label class="radio-label" style="display: flex; align-items: center; gap: 8px;">
                                <input type="radio" name="visibility" value="PUBLIC" th:checked="${project == null or project.visibility == 'PUBLIC'}"><span>🌐 공개</span>
                            </label>
                            <label class="radio-label" style="display: flex; align-items: center; gap: 8px;">
                                <input type="radio" name="visibility" value="PRIVATE" th:checked="${project != null and project.visibility == 'PRIVATE'}"><span>🔒 비공개</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-actions" style="margin-top: 20px;">
                        <button type="submit" class="btn btn-primary" style="background-color: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer;">변경 사항 저장</button>
                    </div>
                </form>

                <div class="danger-zone-wrapper" style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px;">
                    <h4 style="color: var(--danger); font-weight: 600;">⚠️ 위험 구역</h4>
                    <div class="danger-box" style="display: flex; justify-content: space-between; align-items: center; padding: 16px; border: 1px solid var(--danger); border-radius: var(--radius-sm);">
                        <div><h5>프로젝트 삭제</h5><p style="font-size: 0.85rem; color: var(--text-sub);">모든 데이터가 영구 복구 불가합니다.</p></div>
                        <button type="button" class="btn btn-danger" id="deleteWorkspaceBtn" style="background-color: var(--danger); color: #fff; border: none; padding: 10px 16px; border-radius: var(--radius-sm); cursor: pointer;">영구 삭제</button>
                    </div>
                </div>
            </div>
            <!-- ========================================================================== -->
            <!-- [탭 2] 팀원 및 역할 관리 구역 (독립된 members.html 조립) -->
            <!-- ========================================================================== -->
            <div id="member-tab" class="tab-content" style="display: none;">
                <div th:insert="~{manage/members :: workspaceMembers}"></div>
            </div>

            <!-- ========================================================================== -->
            <!-- [탭 3] 4-2-1. 팀원 초대 구역 -->
            <!-- ========================================================================== -->
            <div id="invite-tab" class="tab-content" style="display: none;">
                <div class="content-header">
                    <h3>✉️ 프로젝트 팀원 초대</h3>
                    <p>함께 협업할 팀원들의 구글 이메일 계정을 입력하여 초대장을 발송합니다.</p>
                </div>

                <form action="/project/manage/invite/send" method="post" style="margin-top: 24px; max-width: 600px;">
                    <input type="hidden" name="_csrf" th:value="${_csrf != null} ? ${_csrf.token} : ''"/>
                    <div class="form-group">
                        <label class="form-label" style="font-weight: 600;">초대 이메일 주소</label>
                        <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                            <input type="email" name="emails" class="form-input" placeholder="example@gmail.com" required>
                        </div>
                    </div>
                    <div style="margin-top: 20px;">
                        <button type="submit" class="btn btn-primary" style="background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; font-weight: bold;">초대장 대량 발송 트리거</button>
                    </div>
                </form>
            </div>

            <!-- ========================================================================== -->
            <!-- [탭 4] 4-4. 프로젝트 게시판 관리 구역 (독립된 boards.html 조립) -->
            <!-- ========================================================================== -->
            <div id="board-tab" class="tab-content" style="display: none;">
                <div th:insert="~{manage/boards :: workspaceBoards}"></div>
            </div>

        </main>
    </div>
</div>

<script th:src="@{/js/manage/project-manage.js}"></script>  <!-- 공통/탭 전환 -->
<script th:src="@{/js/manage/manage-general.js}"></script>  <!-- 일반 관리 전용 -->
<script th:src="@{/js/manage/manage-member.js}"></script>   <!-- 팀원 관리 전용 -->
<script th:src="@{/js/manage/manage-invite.js}"></script>   <!-- 팀원 초대 전용 -->
<script th:src="@{/js/manage/manage-board.js}"></script>    <!-- 게시판 관리 전용 -->
</body>
</html>
