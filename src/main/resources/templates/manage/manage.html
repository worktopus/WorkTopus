<!DOCTYPE html>
<html lang="ko" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Worktopus - 프로젝트 관리</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/manage.css}">

    <!-- 추가 헤더 css-->
    <link rel="stylesheet" th:href="@{/css/homeHeader.css}">
</head>
<body>
<div class="layout">
    <!-- 1. 왼쪽 사이드바 영역 연동 -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- 2. 오른쪽 메인 콘텐츠 영역 -->
    <div class="layout__content">
        <!-- 공통 헤더 바 연결 -->
        <div th:replace="~{fragments/header :: header}"></div>

        <!-- 실제 관리 폼 메인 페이지 -->
        <main class="manage-container" style="padding: 40px; width: 100%;">
            <h1 class="manage-title" style="font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; color: var(--text-main);">
                프로젝트 관리 (팀장 전용)
            </h1>

            <!-- [일반관리 HTML - 상단 탭 바 동적 ID 파이프라인 전면 적용] -->
            <div class="manage-tabs">
                <button class="tab-btn active" th:onclick="|location.href='/projects/manage/' + ${projectId}|">일반 관리</button>
                <button class="tab-btn" th:onclick="|location.href='/projects/manage/' + ${projectId} + '/members'|">팀원 관리</button>
                <button class="tab-btn" th:onclick="|location.href='/projects/manage/' + ${projectId} + '/invite'|">팀원 초대</button>
                <button class="tab-btn" th:onclick="|location.href='/projects/manage/' + ${projectId} + '/boards'|">게시판 관리</button>
            </div>


            <!-- [탭 1] 프로젝트 일반 관리 구역 -->
            <div id="general-tab" class="tab-content active" style="display: block;">
                <div class="content-header">
                    <h3>🔧 프로젝트 일반 관리</h3>
                    <p>프로젝트의 기본 정보를 수정하거나 저장소를 안전하게 관리합니다.</p>
                </div>

                <!-- 프로젝트 이름 변경 폼 -->
                <form th:action="@{/api/manage/general-update}" method="post" class="manage-form">
                    <input type="hidden" name="_csrf" th:value="${_csrf != null} ? ${_csrf.token} : ''"/>
                    <div class="form-group">
                        <label for="projectName" class="form-label">프로젝트 이름</label>
                        <input type="text" id="projectName" name="workspaceName" class="form-input" placeholder="프로젝트명을 입력하세요" th:value="${project != null} ? ${project.name} : 'Worktopus'">
                    </div>
                    <div class="form-actions" style="margin-top: 20px;">
                        <button type="submit" class="btn btn-primary" style="background-color: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer;">변경 사항 저장</button>
                    </div>
                </form>

                <!-- 위험 구역 (프로젝트 삭제) -->
                <div class="danger-zone-wrapper" style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px;">
                    <h4 style="color: var(--danger); font-weight: 600;">⚠️ 위험 구역</h4>
                    <div class="danger-box" style="display: flex; justify-content: space-between; align-items: center; padding: 16px; border: 1px solid var(--danger); border-radius: var(--radius-sm);">
                        <div>
                            <h5>프로젝트 삭제</h5>
                            <p style="font-size: 0.85rem; color: var(--text-sub);">모든 데이터가 영구 복구 불가합니다.</p>
                        </div>
                        <button type="button" class="btn btn-danger" id="deleteWorkspaceBtn" style="background-color: var(--danger); color: #fff; border: none; padding: 10px 16px; border-radius: var(--radius-sm); cursor: pointer;">영구 삭제</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- 필요한 자바스크립트 스크립트만 로드 -->
<script th:src="@{/js/manage/project-manage.js}"></script>
<script th:src="@{/js/manage/manage-general.js}"></script>
</body>
</html>
