<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<body>

<th:block th:fragment="sidebar">
    <aside class="sidebar" id="sidebar">

        <div class="sidebar__header">

            <a th:href="@{/dashboard}" class="sidebar__logo">
                <span class="sidebar__logo-icon">🐙</span>
                <span class="sidebar__logo-text">Worktopus</span>
            </a>

            <button id="sidebarToggle"
                    class="sidebar__toggle"
                    type="button"
                    aria-label="사이드바 접기">
                <img th:src="@{/img/layout-grid.svg}" alt="">
            </button>

        </div>

        <nav class="sidebar__nav">
            <ul class="sidebar__menu">

                <li class="sidebar__item">
                    <a th:href="@{/project/dashboard}"
                       class="sidebar__link sidebar__link--active">
                        <span class="sidebar__icon">
                            <img th:src="@{/img/house.svg}" alt="">
                        </span>
                        <span class="sidebar__text">프로젝트 대시보드</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a th:href="@{/project/board-list}" class="sidebar__link">
                        <span class="sidebar__icon">
                            <img th:src="@{/img/panels-top-left.svg}" alt="">
                        </span>
                        <span class="sidebar__text">프로젝트 작업</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a th:href="@{/kanban}" class="sidebar__link">
                        <span class="sidebar__icon">
                            <img th:src="@{/img/folder-kanban.svg}" alt="">
                        </span>
                        <span class="sidebar__text">칸반보드</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a th:href="@{/calendar}" class="sidebar__link">
                        <span class="sidebar__icon">
                            <img th:src="@{/img/calendar-clock.svg}" alt="">
                        </span>
                        <span class="sidebar__text">캘린더</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a th:href="@{/file}" class="sidebar__link">
                        <span class="sidebar__icon">
                            <img th:src="@{/img/cloud-upload.svg}" alt="">
                        </span>
                        <span class="sidebar__text">파일</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a th:href="@{/memo}" class="sidebar__link">
                        <span class="sidebar__icon">
                            <img th:src="@{/img/square-pen.svg}" alt="">
                        </span>
                        <span class="sidebar__text">메모</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a th:href="@{/chat}" class="sidebar__link">
                        <span class="sidebar__icon">
                            <img th:src="@{/img/settings.svg}" alt="">
                        </span>
                        <span class="sidebar__text">설정</span>
                    </a>
                </li>

            </ul>
        </nav>

        <div class="sidebar__footer">

            <a th:href="@{/setting}" class="sidebar__link" aria-label="설정">
                <span class="sidebar__icon">
                    <img th:src="@{/img/info.svg}" alt="info">
                </span>
            </a>

            <span class="sidebar__divider"></span>

            <a th:href="@{/logout}"
               class="sidebar__link sidebar__logout"
               aria-label="로그아웃">
                <span class="sidebar__icon">
                    <img th:src="@{/img/log-out.svg}" alt="logout">
                </span>
            </a>

        </div>

    </aside>
</th:block>

</body>
</html>
