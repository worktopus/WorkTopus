<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<body>

<th:block th:fragment="sidebar">
    <aside class="sidebar" id="sidebar">

        <div class="sidebar__header">

            <a th:href="@{/dashboard}" class="sidebar__logo">
                <span class="sidebar__logo-icon">🐙</span>
                <span class="sidebar__logo-text">Worktopus</span>
            </a>

            <button id="sidebarToggle"
                    class="sidebar__toggle"
                    type="button"
                    aria-label="사이드바 접기">
                <img th:src="@{/img/layout-grid.svg}" alt="">
            </button>

        </div>

        <nav class="sidebar__nav">
            <ul class="sidebar__menu">

                <li class="sidebar__item">
                    <a th:href="@{/project/dashboard}"
                       class="sidebar__link sidebar__link--active">
                        <span class="sidebar__icon" th:insert="~{fragments/icons :: dashboard}">

                        </span>
                        <span class="sidebar__text">대시보드</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a th:href="@{/project/board-list}" class="sidebar__link">
                        <span class="sidebar__icon" th:insert="~{fragments/icons :: project}">
                        </span>
                        <span class="sidebar__text">프로젝트(일반)</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a th:href="@{/project/board-list1}" class="sidebar__link">
                        <span class="sidebar__icon" th:insert="~{fragments/icons :: project1}">
                        </span>
                        <span class="sidebar__text">프로젝트(팝업형)</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a th:href="@{/kanban}" class="sidebar__link">
                        <span class="sidebar__icon" th:insert="~{fragments/icons :: kanban}">
                        </span>
                        <span class="sidebar__text">칸반보드</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a th:href="@{/calendar}" class="sidebar__link">
                        <span class="sidebar__icon" th:insert="~{fragments/icons :: calender}">
                        </span>
                        <span class="sidebar__text">캘린더</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a th:href="@{/file}" class="sidebar__link">
                        <span class="sidebar__icon" th:insert="~{fragments/icons :: file}">
                        </span>
                        <span class="sidebar__text">파일</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a th:href="@{/memo}" class="sidebar__link">
                        <span class="sidebar__icon" th:insert="~{fragments/icons :: memo}">
                        </span>
                        <span class="sidebar__text">메모</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a th:href="@{/chat}" class="sidebar__link">
                        <span class="sidebar__icon" th:insert="~{fragments/icons :: setting}">
                        </span>
                        <span class="sidebar__text">설정</span>
                    </a>
                </li>

            </ul>
        </nav>

        <div class="sidebar__footer">

            <a th:href="@{/setting}" class="sidebar__link" aria-label="내 정보">
                <span class="sidebar__icon" th:insert="~{fragments/icons :: info}">
                </span>
            </a>

            <span class="sidebar__divider"></span>

            <a th:href="@{/logout}"
               class="sidebar__link sidebar__logout"
               aria-label="로그아웃">
                <span class="sidebar__icon" th:insert="~{fragments/icons :: logout}">
                </span>
            </a>

        </div>

    </aside>
</th:block>

</body>
</html>
