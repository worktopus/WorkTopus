<!DOCTYPE html>
<html lang="ko" xmlns:th="http://thymeleaf.org">
<body>

<th:block th:fragment="header">
    <header class="header">

        <!-- 왼쪽 영역 (프로젝트 스위처) -->
        <div class="header__left">
            <button class="header__project-switcher">
                <div class="header__project-bg">
                    <span class="header__project-icon" th:block th:insert="~{fragments/icons :: prjopen}"></span>
                </div>
                <div class="header__project-info">
                    <span class="header__project-name" th:text="${project != null} ? ${project.name} : 'Worktopus'">
                        Worktopus
                    </span>
                </div>
                <img th:src="@{/img/caret-down.svg}" class="header__project-arrow" alt="">
            </button>
        </div>

        <!-- 오른쪽 영역 (알림, 채팅, 프로필) -->
        <div class="header__right">

            <!-- 알림 버튼 -->
            <button class="header__icon" type="button" aria-label="알림">
                <span class="header__icon" th:block th:insert="~{fragments/icons :: bell}"></span>
                <span class="header__badge">3</span>
            </button>

            <!-- 채팅 버튼 -->
            <button id="chatButton" class="header__icon" type="button" onclick="openChat()" aria-label="채팅 열기">
                <span th:insert="~{fragments/icons :: chat}"></span>
            </button>

            <!-- 프로필 영역 (실시간 데이터 바인딩 연동) -->
            <div class="header__profile">
                <img th:src="@{/img/circle-user-round.svg}" alt="프로필">
                <div class="header__info">
                    <!-- [교정] 로그인한 사용자의 실제 name 매핑 및 JS 연동용 ID 부여 -->
                    <p id="header-user-name" class="header__name" th:text="${user != null ? user.name : '김여린'}">
                        김여린
                    </p>
                    <!-- [교정] 실시간 담당 역할 변환을 추적하기 위한 고유 ID 추가 부여 -->
                    <span id="header-user-task" class="header__role">
                        Backend Developer
                    </span>
                </div>
            </div>

        </div>
    </header>

    <!-- 신승민: 실시간 채팅 팝업 -->
    <link rel="stylesheet" th:href="@{/css/chat.css}">

    <!-- 채팅 팝업 본체 -->
    <div id="chatModal">

        <!-- 1. 채팅방 목록 화면 -->
        <div id="chatListView">
            <div class="chat-header">
                <strong>채팅</strong>
                <button type="button" onclick="closeChat()" aria-label="채팅 닫기">✖</button>
            </div>

            <!-- 탭 메뉴 (전체 / 프로젝트 / 개인) -->
            <div class="chat-list-tabs">
                <button id="allRoomTab" class="active" type="button" onclick="filterRoomList('all')">전체</button>
                <button id="groupRoomTab" type="button" onclick="filterRoomList('group')">프로젝트</button>
                <button id="privateRoomTab" type="button" onclick="filterRoomList('private')">개인</button>
            </div>

            <!-- 채팅방 검색 -->
            <div class="chat-search-area">
                <input id="chatRoomSearchInput" type="text" placeholder="프로젝트 / 사용자 검색" oninput="searchChatRooms()">
            </div>

            <!-- 채팅방 목록 출력부 -->
            <div class="chat-room-list-wrap">
                <div id="chatRoomList">
                    <!-- chatList.js에서 동적 생성 -->
                </div>
            </div>
        </div>
        <!-- 2. 실제 대화 화면 -->
        <div id="chatRoomView" style="display:none;">
            <div class="chat-header">
                <div class="chat-room-header-left">
                    <button type="button" class="chat-back-btn" onclick="backToChatList()" aria-label="채팅방 목록으로 돌아가기">
                        ←
                    </button>
                    <div class="chat-room-header-text">
                        <strong id="chatRoomTitle">채팅방</strong>
                        <span id="chatRoomSubTitle"></span>
                    </div>
                </div>
                <button type="button" onclick="closeChat()" aria-label="채팅 닫기">✖</button>
            </div>

            <!-- 메시지 본문 영역 -->
            <div class="chat-body">
                <div class="chat-content">
                    <!-- 프로젝트 단체 채팅 -->
                    <div id="groupChat">
                        <div id="messageArea">
                            <!-- groupChat.js에서 메시지 생성 -->
                        </div>
                    </div>

                    <!-- 개인 채팅 (DM) -->
                    <div id="privateChat" style="display:none;">
                        <div id="privateMessageArea">
                            <div id="dmArea">
                                <!-- privateChat.js에서 메시지 생성 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 메시지 입력창 -->
            <div class="chat-input">
                <input id="message" type="text" placeholder="메시지를 입력하세요">
                <button id="sendBtn" type="button">전송</button>
            </div>

            <!-- 프로젝트 단체 채팅 전용 하단 메뉴 -->
            <div class="chat-footer">
                <button id="aiMeetingSummaryButton" type="button">🤖 AI 회의요약</button>
                <button id="aiMeetingHistoryButton" type="button">📋 회의록 기록</button>
                <button id="boardBtn" type="button">📌 게시글 작성</button>
            </div>
        </div>

    </div>

    <!-- 실제 로그인 사용자 → 채팅 JavaScript 전달 (기존 유지) -->
    <script th:inline="javascript">
        window.loginUser = {
            userNum: /*[[${user != null ? user.userNum : null}]]*/ null,
            userId: /*[[${user != null ? user.userId : ''}]]*/ "",
            name: /*[[${user != null ? user.name : ''}]]*/ ""
        };

        console.log(
            "채팅 로그인 사용자:",
            window.loginUser
        );
    </script>

    <!-- 외부 라이브러리 및 채팅 관련 스크립트 모음 (기존 유지) -->
    <script src="https://jsdelivr.net"></script>

    <script th:src="@{/js/chat/project.js}"></script>
    <script th:src="@{/js/chat/websocket.js}"></script>
    <script th:src="@{/js/chat/member.js}"></script>
    <script th:src="@{/js/chat/groupChat.js}"></script>
    <script th:src="@{/js/chat/privateChat.js}"></script>
    <script th:src="@{/js/chat/history.js}"></script>
    <script th:src="@{/js/chat/chatList.js}"></script>
    <script th:src="@{/js/chat/chat.js}"></script>

    <!-- AI 회의요약 관련 스크립트 (기존 유지) -->
    <script th:src="@{/js/chat/meetingSummary.js}"></script>
    <script th:src="@{/js/chat/meetingHistory.js}"></script>

</th:block>
</body>
</html>
