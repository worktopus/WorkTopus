<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="header">
    <header class="header">

        <!-- 왼쪽 -->
        <div class="header__left">
            <button class="header__project-switcher">
                <div class="header__project-bg" >
                    <span class="header__project-icon" th:block th:insert="~{fragments/icons :: prjopen}"></span>
                </div>
                <div class="header__project-info">
                    <span class="header__project-name">Worktopus</span>
                </div>
                <img th:src="@{/img/caret-down.svg}" class="header__project-arrow" alt="">
            </button>
        </div>

        <!-- 오른쪽 -->
        <div class="header__right">

            <!-- 알림 -->
            <button class="header__icon" type="button" aria-label="알림">
                <span class="header__icon" th:block th:insert="~{fragments/icons :: bell}"></span>
                <span class="header__badge">3</span>
            </button>

            <!-- 채팅 -->
            <button class="header__icon" th:insert="~{fragments/icons :: chat}"></button>

            <!-- 메모 (클릭 시 투두리스트 팝업 토글) -->
            <button class="header__icon" id="header-memo-btn" onclick="toggleTodoModal(event)">
                <span th:replace="~{fragments/icons :: memo}"></span>
            </button>

            <!-- 프로필 (드롭다운을 감싸는 컨테이너 구조로 변경) -->
            <div class="header__profile-container">
                <div class="header__profile" id="header-profile-trigger" onclick="toggleProfileDropdown(event)">
                    <img th:src="${user?.picture} ?: '/images/logo.png'" alt="프로필" onerror="this.src='/images/logo.png';">

                    <div class="header__info">
                        <p class="header__name" th:text="${user?.name} ?: '게스트'"></p>
                    </div>
                </div>

                <!-- 프로필 클릭 시 나타날 드롭다운 메뉴 -->
                <div class="profile-dropdown" id="profile-dropdown-menu">
                    <!-- 마이페이지 사이드 항목들 -->
                    <a href="/user/mypage?tab=info" class="dropdown-item">내 정보</a>
                    <a href="/user/mypage?tab=posts" class="dropdown-item">내가 쓴 글</a>
                    <a href="/user/mypage?tab=comments" class="dropdown-item">내가 쓴 댓글</a>
                    <a href="/user/mypage?tab=notif" class="dropdown-item">알림</a>

                    <div class="dropdown-divider"></div>

                    <!-- 로그아웃 -->
                    <form th:action="@{/logout}" method="post" style="margin: 0;">
                        <button type="submit" class="dropdown-item logout">로그아웃</button>
                    </form>
                </div>
            </div>

        </div>
    </header>

    <!-- 팝업 형태의 독립된 투두리스트 (화면 우상단에 레이어로 뜸) -->
    <div class="todo-modal" id="todo-popup-modal">
        <div class="todo-modal-header">
            <span class="todo-modal-title">TODO</span>
            <button class="todo-modal-close" onclick="toggleTodoModal(event)">×</button>
        </div>
        <div class="todo-modal-body">
            <div class="todo-input-group" style="display: flex; gap: 8px; margin-bottom: 8px;">
                <input type="text" id="popup-todo-input" placeholder="할 일을 입력하세요."
                       style="flex: 1; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 13px;"
                       onkeypress="if(event.keyCode==13) addPopupTodo()">
                <button onclick="addPopupTodo()" style="padding: 8px 14px; background-color: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer;">추가</button>
            </div>

            <ul class="todo-list" id="popup-todo-list-container" style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px;">
                <!-- 비동기로 리스트 바인딩 -->
            </ul>
        </div>
    </div>

    <script th:inline="javascript">

        // 1. 공통 CSRF 토큰 설정 (HTML 헤더에 등록된 메타 태그로부터 읽어옵니다)
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');

        // 💡 [수정 포인트] 맨 위에 정의되어 있던 연습용 fetch('/api/todo') 부분은 에러를 발생시키므로 삭제했습니다.

        // 프로필 드롭다운 제어
        function toggleProfileDropdown(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('profile-dropdown-menu');
            dropdown.classList.toggle('active');

            // 프로필 켜면 메모 모달은 닫기
            document.getElementById('todo-popup-modal').classList.remove('active');
        }

        /* ==========================================
         * 2. 투두리스트 모달 제어 및 API 비동기 처리
         * ========================================== */
        function toggleTodoModal(event) {
            event.stopPropagation();
            const modal = document.getElementById('todo-popup-modal');
            modal.classList.toggle('active');

            // 메모 켜면 프로필 드롭다운은 닫기
            document.getElementById('profile-dropdown-menu').classList.remove('active');

            if (modal.classList.contains('active')) {
                loadPopupTodoList();
            }
        }

        // 바깥 영역 클릭 시 드롭다운과 모달 모두 닫기
        document.addEventListener('click', function() {
            document.getElementById('profile-dropdown-menu').classList.remove('active');
            document.getElementById('todo-popup-modal').classList.remove('active');
        });

        // 팝업 내부 클릭 시 바깥 클릭 이벤트 전파 차단
        document.getElementById('todo-popup-modal').addEventListener('click', function(e) {
            e.stopPropagation();
        });

        // 투두리스트 로드 (GET 요청은 CSRF 토큰이 필요하지 않습니다)
        function loadPopupTodoList() {
            fetch("/api/todo")
                .then(res => res.json())
                .then(list => {
                    const container = document.getElementById('popup-todo-list-container');
                    container.innerHTML = '';

                    if (list.length === 0) {
                        container.innerHTML = `<li style="color: #94a3b8; text-align: center; padding: 20px 0; font-size: 13px;">등록된 할 일이 없습니다.</li>`;
                        return;
                    }

                    list.forEach(todo => {
                        const li = document.createElement('li');

                        // 💡 [핵심 수정] 엔티티 필드명에 맞춰 todo.completed -> todo.isCompleted 로 수정합니다.
                        const hasCompleted = todo.isCompleted;

                        li.className = `todo-item ${hasCompleted ? 'completed' : ''}`;
                        li.setAttribute('data-id', todo.todoId);

                        li.style.display = 'flex';
                        li.style.justifyContent = 'between';
                        li.style.alignItems = 'center';

                        li.innerHTML = `
                    <div class="todo-left" style="display: flex; align-items: center; gap: 8px; flex: 1;">
                        <!-- 💡 여기도 마찬가지로 todo.isCompleted 기준으로 checked 여부를 바인딩합니다. -->
                        <input type="checkbox" onchange="togglePopupTodo(this)" ${hasCompleted ? 'checked' : ''}>
                        <span class="todo-text" style="${hasCompleted ? 'text-decoration: line-through; color: #94a3b8;' : ''}">${todo.content}</span>
                    </div>
                    <button class="btn-todo-delete" onclick="deletePopupTodo(this)" style="background: none; border: none; color: #ef4444; font-size: 12px; cursor: pointer;">삭제</button>
                `;
                        container.appendChild(li);
                    });
                })
                .catch(err => console.error("투두 로드 실패:", err));
        }

        // 투두 추가 (POST 요청 - CSRF 필수! ⭐️)
        function addPopupTodo() {
            const input = document.getElementById('popup-todo-input');
            const text = input.value.trim();
            if(!text) return;

            fetch("/api/todo", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    // 💡 여기에 CSRF 헤더와 토큰을 탑재합니다.
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify({ content: text })
            })
                .then(res => {
                    if(res.ok) {
                        input.value = '';
                        loadPopupTodoList();
                    } else {
                        alert("추가 실패");
                    }
                })
                .catch(err => console.error("투두 추가 에러:", err));
        }

        // 투두 토글 (PATCH 요청 - CSRF 필수! ⭐️)
        function togglePopupTodo(checkbox) {
            const item = checkbox.closest('.todo-item');
            const todoId = item.getAttribute('data-id');

            // CSRF 토큰 읽기 (disable 상태이면 null 또는 undefined가 될 수 있음)
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');

            // 💡 CSRF 작동 여부에 따라 헤더 동적 생성 (disable 상태여도 오류 안 나게 방어)
            const requestHeaders = {};
            if (csrfHeader && csrfToken) {
                requestHeaders[csrfHeader] = csrfToken;
            }

            fetch(`/api/todo/${todoId}`, {
                method: "PATCH",
                headers: requestHeaders // 💡 안전하게 정제된 헤더 장착
            })
                .then(res => {
                    if(res.ok) {
                        const textSpan = item.querySelector('.todo-text');
                        if(checkbox.checked) {
                            textSpan.style.textDecoration = 'line-through';
                            textSpan.style.color = '#94a3b8';
                            item.classList.add('completed');
                        } else {
                            textSpan.style.textDecoration = 'none';
                            textSpan.style.color = 'inherit';
                            item.classList.remove('completed'); // 💡 체크 풀 때도 클래스 확실히 제거
                        }
                    } else {
                        alert("수정 실패");
                        checkbox.checked = !checkbox.checked;
                    }
                })
                .catch(err => {
                    console.error("투두 수정 에러:", err);
                    checkbox.checked = !checkbox.checked;
                });
        }

        // 투두 삭제 (DELETE 요청 - CSRF 필수! ⭐️)
        function deletePopupTodo(button) {
            if(!confirm('이 항목을 삭제하시겠습니까?')) return;

            const item = button.closest('.todo-item');
            const todoId = item.getAttribute('data-id');

            fetch(`/api/todo/${todoId}`, {
                method: "DELETE",
                headers: {
                    // 💡 삭제 요청(DELETE) 역시 CSRF 토큰을 동반해야 안전하게 허가됩니다.
                    [csrfHeader]: csrfToken
                }
            })
                .then(res => {
                    if(res.ok) {
                        item.remove();
                    } else {
                        alert("삭제 실패");
                    }
                })
                .catch(err => console.error("투두 삭제 에러:", err));
        }
    </script>
</th:block>

</body>
</html>
