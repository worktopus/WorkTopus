<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="homeHeader">
    <header class="header">

        <!-- 왼쪽 -->
        <div class="header__left">
            <a href="/projects" class="projects-logo">
                <img src="/images/logo.png" alt="WorkTopus logo" class="projects-logo-img">
                <span class="projects-logo-text">WorkTopus</span>
            </a>
        </div>

        <!-- 오른쪽 -->
        <div class="header__right">

            <!-- 알림 -->
            <button class="header__icon" type="button" aria-label="알림">
                <span class="header__icon" th:block th:insert="~{fragments/icons :: bell}"></span>
                <span class="header__badge">3</span>
            </button>

            <!-- 채팅 -->
            <button class="header__icon" th:insert="~{fragments/icons :: chat}"></button>

            <!-- 메모 -->
            <button class="header__icon" id="header-memo-btn" onclick="toggleTodoModal(event)">
                <span th:replace="~{fragments/icons :: memo}"></span>
            </button>

            <!-- 프로필 -->
            <div class="header__profile-container">
                <div class="header__profile" id="header-profile-trigger" onclick="toggleProfileDropdown(event)">
                    <img th:src="${user?.picture} ?: '/images/logo.png'" alt="프로필" onerror="this.src='/images/logo.png';">

                    <div class="header__info">
                        <p class="header__name" th:text="${user?.name} ?: '게스트'"></p>
                    </div>
                </div>

                <!-- 프로필 클릭 시 나타날 드롭다운 메뉴 -->
                <div class="profile-dropdown" id="profile-dropdown-menu">
                    <!-- 마이페이지 사이드 항목들 -->
                    <a href="/user/mypage?tab=info" class="dropdown-item">내 정보</a>
                    <a href="/user/mypage?tab=posts" class="dropdown-item">내가 쓴 글</a>
                    <a href="/user/mypage?tab=comments" class="dropdown-item">내가 쓴 댓글</a>
                    <a href="/user/mypage?tab=notif" class="dropdown-item">알림</a>

                    <div class="dropdown-divider"></div>

                    <!-- 로그아웃 -->
                    <form th:action="@{/logout}" method="post" style="margin: 0;">
                        <button type="submit" class="dropdown-item logout">로그아웃</button>
                    </form>
                </div>
            </div>

        </div>
    </header>

    <!-- 팝업 형태의 독립된 투두리스트 -->
    <div class="todo-modal" id="todo-popup-modal">
        <div class="todo-modal-header">
            <span class="todo-modal-title">MEMO</span>
            <button class="todo-modal-close" onclick="toggleTodoModal(event)">×</button>
        </div>
        <div class="todo-modal-body">
            <!-- 자유로운 메모 입력을 위한 Textarea -->
            <textarea id="popup-memo-textarea"
                      placeholder="여기에 자유롭게 메모를 작성하세요..."
                      oninput="triggerAutoSave()"></textarea>

            <div class="memo-status-container">
                <!-- 수동 저장 버튼을 없애고 자동 저장 상태만 표시 -->
                <span id="memo-save-status">저장됨</span>
            </div>
        </div>
    </div>

    <script th:inline="javascript">

        //  공통 CSRF 토큰 설정
        const csrfToken  = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');

        // 프로필 드롭다운 제어
        function toggleProfileDropdown(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('profile-dropdown-menu');
            dropdown.classList.toggle('active');

            // 프로필 켜면 메모 모달은 닫기
            document.getElementById('todo-popup-modal').classList.remove('active');
        }

        // 투두리스트 모달 제어, API 비동기 처리
        function toggleTodoModal(event) {
            event.stopPropagation();
            const modal = document.getElementById('todo-popup-modal');
            modal.classList.toggle('active');

            // 메모 켜면 프로필 드롭다운은 닫기
            document.getElementById('profile-dropdown-menu').classList.remove('active');

            if (modal.classList.contains('active')) {
                loadPopupTodoList();
            }
        }

        // 바깥 영역 클릭 시 드롭다운과 모달 모두 닫기
        document.addEventListener('click', function() {
            document.getElementById('profile-dropdown-menu').classList.remove('active');
            document.getElementById('todo-popup-modal').classList.remove('active');
        });

        // 팝업 내부 클릭 시 바깥 클릭 이벤트 전파 차단
        document.getElementById('todo-popup-modal').addEventListener('click', function(e) {
            e.stopPropagation();
        });

        // 투두리스트 로드
        let autoSaveTimeout = null;

        // 1. 메모 불러오기
        function loadMemo() {
            const statusText = document.getElementById('memo-save-status');
            statusText.innerText = "불러오는 중...";

            fetch("/api/todo") // 👈 기존 투두 API를 그대로 활용합니다.
                .then(res => res.json())
                .then(list => {
                    const textarea = document.getElementById('popup-memo-textarea');

                    // 기존 투두 목록 중 가장 첫 번째 항목(혹은 통합 메모용 하나)을 가져와 통째로 뿌려줍니다.
                    if (list && list.length > 0) {
                        textarea.value = list[0].content; // 첫 번째 데이터의 내용을 메모장 전체 글로 매핑
                        textarea.setAttribute('data-id', list[0].todoId); // 수정용 id 저장
                    } else {
                        textarea.value = '';
                        textarea.removeAttribute('data-id');
                    }
                    statusText.innerText = "저장됨";
                })
                .catch(err => {
                    console.error("메모 로드 실패:", err);
                    statusText.innerText = "불러오기 실패";
                });
        }

        // 2. 메모 저장하기 (추가 혹은 수정)
        function saveMemo() {
            const textarea = document.getElementById('popup-memo-textarea');
            const text = textarea.value;
            const todoId = textarea.getAttribute('data-id');
            const statusText = document.getElementById('memo-save-status');

            statusText.innerText = "저장 중...";

            const requestHeaders = {
                "Content-Type": "application/json"
            };
            if (csrfHeader && csrfToken) {
                requestHeaders[csrfHeader] = csrfToken;
            }

            // 이미 등록된 메모(todoId가 있는 경우)가 있다면 수정을 요청(PUT/PATCH)하고, 없으면 새로 등록(POST)합니다.
            if (todoId) {
                // 기존 데이터 수정 API 호출
                fetch(`/api/todo/${todoId}`, {
                    method: "PATCH",
                    headers: requestHeaders,
                    body: JSON.stringify({ content: text })
                })
                    .then(res => {
                        if (res.ok) {
                            statusText.innerText = "저장됨";
                        } else {
                            statusText.innerText = "저장 실패";
                        }
                    })
                    .catch(err => {
                        console.error("메모 수정 실패:", err);
                        statusText.innerText = "저장 오류";
                    });
            } else {
                // 데이터가 아예 없을 때 신규 메모 생성 (최초 1회 실행)
                fetch("/api/todo", {
                    method: "POST",
                    headers: requestHeaders,
                    body: JSON.stringify({ content: text })
                })
                    .then(res => {
                        if (res.ok) {
                            loadMemo(); // ID를 새로 받아오기 위해 다시 로드
                        } else {
                            statusText.innerText = "저장 실패";
                        }
                    })
                    .catch(err => {
                        console.error("메모 추가 실패:", err);
                        statusText.innerText = "저장 오류";
                    });
            }
        }

        // 3. 타이핑을 멈추고 1초 뒤에 자동으로 저장되는 '자동 저장' 기능 (디바운싱 기술 적용)
        function triggerAutoSave() {
            const statusText = document.getElementById('memo-save-status');
            statusText.innerText = "입력 중...";

            // 이전 대기 중이던 타이머가 있다면 취소하여 API 중복 호출 방지
            if (autoSaveTimeout) {
                clearTimeout(autoSaveTimeout);
            }

            // 키보드 입력을 멈추고 1초(1000ms) 동안 대기하면 자동으로 saveMemo()가 작동합니다.
            autoSaveTimeout = setTimeout(() => {
                saveMemo();
            }, 1000);
        }
    </script>
</th:block>

</body>
</html>
