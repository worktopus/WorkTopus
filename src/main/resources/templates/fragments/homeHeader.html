<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="homeHeader">
    <header class="header">

        <!-- 왼쪽 -->
        <div class="header__left">
            <a href="/projects" class="projects-logo">
                <img src="/images/logo.png" alt="WorkTopus logo" class="projects-logo-img">
                <span class="projects-logo-text">WorkTopus</span>
            </a>
        </div>

        <!-- 오른쪽 -->
        <div class="header__right">

            <!-- 알림 -->
            <button class="header__icon" type="button" aria-label="알림" id="header-notif-btn" onclick="toggleNotifModal(event)">
                <span class="header__icon" th:block th:insert="~{fragments/icons :: bell}"></span>
                <span class="header__badge" id="header-notif-badge" style="display: none;">0</span>
            </button>

            <!-- 채팅 버튼 -->
            <button id="chatButton"
                    class="header__icon chat-button"
                    type="button"
                    onclick="openChat()"
                    aria-label="채팅 열기">

                <!-- 채팅 아이콘 -->
                <span th:insert="~{fragments/icons :: chat}"></span>

                <!-- 전체 안 읽은 메시지 숫자 -->
                <span class="header__badge chat-unread-badge"
                      aria-label="안 읽은 메시지"
                      style="display: none;">
                    0
                </span>

            </button>

            <!-- 메모 -->
            <button class="header__icon" id="header-memo-btn" onclick="toggleTodoModal(event)">
                <span th:replace="~{fragments/icons :: memo}"></span>
            </button>

            <!-- 프로필 -->
            <div class="header__profile-container">
                <div class="header__profile" id="header-profile-trigger" onclick="toggleProfileDropdown(event)">
                    <img th:src="${user?.picture} ?: '/images/logo.png'" alt="프로필" onerror="this.src='/images/logo.png';">

                    <div class="header__info">
                        <p class="header__name" th:text="${user?.name} ?: '게스트'"></p>
                    </div>
                </div>

                <!-- 프로필 클릭 시 나타날 드롭다운 메뉴 -->
                <div class="profile-dropdown" id="profile-dropdown-menu">
                    <!-- 마이페이지 사이드 항목들 -->
                    <a href="/user/mypage?tab=info" class="dropdown-item">내 정보</a>
                    <a href="/user/mypage?tab=posts" class="dropdown-item">내가 쓴 글</a>
                    <a href="/user/mypage?tab=comments" class="dropdown-item">내가 쓴 댓글</a>
                    <a href="/user/mypage?tab=notif" class="dropdown-item">알림</a>

                    <div class="dropdown-divider"></div>

                    <!-- 로그아웃 -->
                    <form th:action="@{/logout}" method="post" style="margin: 0;">
                        <button type="submit" class="dropdown-item logout">로그아웃</button>
                    </form>
                </div>
            </div>

        </div>
    </header>

<!-----------------------------------------팝업-------------------------------------------->
    <!-- 실시간 채팅 팝업 -->
    <link rel="stylesheet" th:href="@{/css/chat.css}">

    <div id="chatModal">

        <!-- 1. 채팅방 목록 화면 -->
        <div id="chatListView">

            <div class="chat-header">
                <strong>채팅</strong>
                <button type="button" onclick="closeChat()" aria-label="채팅 닫기">✖</button>
            </div>

            <!-- 전체 / 프로젝트 / 개인 -->
            <div class="chat-list-tabs">
                <button id="allRoomTab" class="active" type="button" onclick="filterRoomList('all')">전체</button>
                <button id="groupRoomTab" type="button" onclick="filterRoomList('group')">프로젝트</button>
                <button id="privateRoomTab" type="button" onclick="filterRoomList('private')">개인</button>
            </div>

            <!-- 채팅방 검색 -->
            <div class="chat-search-area">
                <input id="chatRoomSearchInput" type="text" placeholder="프로젝트 / 사용자 검색" oninput="searchChatRooms()">
            </div>

            <!-- 채팅방 목록 -->
            <div class="chat-room-list-wrap">
                <div id="chatRoomList"><!-- chatList.js에서 생성 --></div>
            </div>

        </div>

        <!-- 2. 실제 대화 화면 -->
        <div id="chatRoomView" style="display:none;">

            <div class="chat-header">
                <div class="chat-room-header-left">
                    <button type="button" class="chat-back-btn" onclick="backToChatList()" aria-label="채팅방 목록으로 돌아가기">←</button>

                    <div class="chat-room-header-text">
                        <strong id="chatRoomTitle">채팅방</strong>
                        <span id="chatRoomSubTitle"></span>
                    </div>
                </div>

                <button type="button" onclick="closeChat()" aria-label="채팅 닫기">✖</button>
            </div>

            <!-- 메시지 영역 -->
            <div class="chat-body">
                <div class="chat-content">

                    <!-- 프로젝트 단체 채팅 -->
                    <div id="groupChat"><div id="messageArea"><!-- groupChat.js에서 메시지 생성 --></div></div>

                    <!-- 개인 채팅 -->
                    <div id="privateChat" style="display:none;">
                        <div id="privateMessageArea">
                            <div id="dmArea"><!-- privateChat.js에서 메시지 생성 --></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 메시지 입력 -->
            <div class="chat-input">
                <input id="message" type="text" placeholder="메시지를 입력하세요">
                <button id="sendBtn" type="button">전송</button>
            </div>

            <!-- 프로젝트 단체 채팅에서만 표시 -->
            <div class="chat-footer">
                <button id="aiMeetingSummaryButton" type="button">🤖 AI 회의요약</button>
                <button id="aiMeetingHistoryButton" type="button">📋 회의록 기록</button>
                <button id="boardBtn" type="button">📌 게시판 등록</button>
            </div>

        </div>

    </div>

    <!-- 팝업 형태의 독립된 투두리스트 -->
    <div class="todo-modal" id="todo-popup-modal">
        <div class="todo-modal-header">
            <span class="todo-modal-title">MEMO</span>
            <button class="todo-modal-close" onclick="toggleTodoModal(event)">×</button>
        </div>
        <div class="todo-modal-body">
            <!-- 자유로운 메모 입력을 위한 Textarea -->
            <textarea id="popup-memo-textarea"
                      placeholder="여기에 자유롭게 메모를 작성하세요..."
                      oninput="triggerAutoSave()"></textarea>

            <div class="memo-status-container">
                <!-- 수동 저장 버튼을 없애고 자동 저장 상태만 표시 -->
                <span id="memo-save-status">저장됨</span>
            </div>
        </div>
    </div>

    <!-- 알림 팝업 -->
    <div class="todo-modal" id="notif-popup-modal">
        <div class="todo-modal-header">
            <span class="todo-modal-title">알림</span>
            <button class="todo-modal-close" onclick="toggleNotifModal(event)">×</button>
        </div>
        <div class="todo-modal-body">
            <ul id="popup-notif-list">
            </ul>
        </div>
    </div>

              <!------------------------script------------------------->
    <!-- 실제 로그인 사용자 정보를 채팅 JavaScript에 전달 -->
    <script th:inline="javascript">
        window.loginUser = {
            userNum: /*[[${user != null ? user.userNum : null}]]*/ null,
            userId: /*[[${user != null ? user.userId : ''}]]*/ "",
            name: /*[[${user != null ? user.name : ''}]]*/ ""
        };

        console.log(
            "채팅 로그인 사용자:",
            window.loginUser
        );
    </script>

    <!-- 홈 헤더 추후 헤더와 통합? -->
    <script th:src="@{/js/homeHeader.js}"></script>

    <!-- notification 추가 -->
    <script th:src="@{/js/notification/notification.js}"></script>

    <!-- WebSocket 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <!-- 프로젝트 및 채팅 스크립트 -->
    <script th:src="@{/js/chat/project.js}"></script>
    <script th:src="@{/js/chat/websocket.js}"></script>
    <script th:src="@{/js/chat/member.js}"></script>
    <script th:src="@{/js/chat/groupChat.js}"></script>
    <script th:src="@{/js/chat/privateChat.js}"></script>
    <script th:src="@{/js/chat/history.js}"></script>
    <script th:src="@{/js/chat/chatList.js}"></script>
    <script th:src="@{/js/chat/chat.js}"></script>
    <script th:src="@{/js/chat/meetingSummary.js}"></script>
    <script th:src="@{/js/chat/meetingHistory.js}"></script>

    <!-- todo -->
    <script th:src="@{/js/todo/todo.js}"></script>

</th:block>

</body>
</html>
