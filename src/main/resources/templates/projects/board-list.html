<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Worktopus | Project-Board</title>

    <link rel="stylesheet" th:href="@{/css/chat.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/projects/board-list.css}">
</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

    <div class="layout__content">

        <!-- Header -->
        <th:block th:replace="~{fragments/header :: header}"></th:block>

        <!-- Content -->
        <main class="board">

            <!-- 프로젝트 헤더 -->
            <section class="board_head">

                <div>
                    <p class="board_label">PROJECT BOARD</p>

                    <h1 class="board_title">
                        Worktopus 프로젝트 게시판
                    </h1>

                    <p class="board_desc">
                        프로젝트 공지, 회의 내용, 업무 공유를 한 곳에서 관리합니다.
                    </p>
                </div>

                <a th:href="@{/projects/{projectId}/boards/write(projectId=${projectId})}"
                   class="board_write-btn">
                    + 새 글 작성
                </a>

            </section>

            <!-- 공지 -->
            <section class="board_notice"
                     th:if="${latestNotice != null}">

                <div class="board_notice-icon">
                    📢
                </div>

                <div class="board_notice-content">
                    <span class="board_notice-label">중요 공지</span>

                    <a th:href="@{/projects/{projectId}/boards/{boardId}(
               projectId=${projectId},
               boardId=${latestNotice.boardId})}"
                       th:text="${latestNotice.title}"
                       class="board_notice-title">
                        공지 제목
                    </a>
                </div>

                <span class="board_notice-date"
                      th:text="${#temporals.format(
                      latestNotice.createdAt,
                      'yyyy.MM.dd'
                  )}">
                2026.07.07
            </span>

            </section>

            <!-- 검색 / 필터 -->
            <form class="board_toolbar"
                  th:action="@{/projects/{projectId}/boards(projectId=${projectId})}"
                  method="get">

                <div class="board_search">
                    <input type="text"
                           class="board_search-input"
                           th:value="${keyword}"
                           placeholder="게시글 제목, 작성자, 태그 검색">
                </div>

                <select class="board_select">
                    <option>전체 카테고리</option>
                    <option>공지</option>
                    <option>회의</option>
                    <option>개발</option>
                    <option>디자인</option>
                    <option>기획</option>
                </select>

                <select class="board_select">
                    <option>최신순</option>
                    <option>댓글 많은 순</option>
                    <option>조회순</option>
                </select>

                <button type="submit" class="board_search-btn">
                    검색
                </button>

            </form>

            <!-- 게시글 목록 -->
            <section class="board_list">

                <article class="board_card"
                         th:each="board : ${boards.content}">

                    <div class="board_card-top">
            <span class="board_badge board_badge-notice"
                  th:if="${board.notice}">
                공지
            </span>

                        <span class="board_priority board_priority-normal">
                보통
            </span>
                    </div>

                    <a th:href="@{/projects/{projectId}/boards/{boardId}
            (projectId=${projectId}, boardId=${board.id})}"
                       class="board_card-title"
                       th:text="${board.title}">
                        게시글 제목
                    </a>

                    <p class="board_card-desc"
                       th:text="${board.contentPreview}">
                        게시글 내용 미리보기
                    </p>

                    <div class="board_card-meta">
                        <span th:text="'👤 ' + ${board.writerName}">👤 작성자</span>
                        <span th:text="'💬 ' + ${board.commentCount}">💬 0</span>
                        <span th:text="'👁 ' + ${board.viewCount}">👁 0</span>
                        <span th:text="${board.createdAt != null ? '📅 ' + #temporals.format(board.createdAt, 'yyyy.MM.dd') : '📅 -'}">
                        📅 -
                    </span>
                    </div>

                </article>

            </section>

            <!-- 페이지네이션 -->
            <nav class="board_pagination" th:if="${boards.totalPages > 0}">

                <a th:if="${boards.startPage > 1}"
                   th:href="@{/projects/{projectId}/boards(
                    projectId=${projectId},page=${boards.startPage - 2})}"
                   class="board_page-btn">
                    &lt;
                </a>

                <th:block th:each="page : ${#numbers.sequence(boards.startPage, boards.endPage)}">
                    <a th:href="@{/projects/{projectId}/boards(
                        projectId=${projectId},page=${page - 1})}"
                       class="board_page-btn"
                       th:classappend="${page == boards.currentPage} ? ' is-active'">
                        <span th:text="${page}">1</span>
                    </a>
                </th:block>

                <a th:if="${boards.endPage < boards.totalPages}"
                   th:href="@{/projects/{projectId}/boards(
                    projectId=${projectId},page=${boards.endPage})}"
                   class="board_page-btn">
                    &gt;
                </a>

            </nav>

        </main>

    </div>

</div>

<script th:src="@{/js/projects/board-list.js}"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script src="/js/header.js"></script>

</body>
</html>
