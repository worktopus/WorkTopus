<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Worktopus | 프로젝트 게시판</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/projects/board-list1.css}">
</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

    <div class="layout__content">

        <!-- Header -->
        <th:block th:replace="~{fragments/header :: header}"></th:block>

        <!-- Content -->
        <main class="board">

            <!-- 프로젝트 헤더 -->
            <section class="board_head">

                <div>
                    <p class="board_label">PROJECT BOARD</p>

                    <h1 class="board_title">
                        Worktopus 프로젝트 게시판
                    </h1>

                    <p class="board_desc">
                        프로젝트 공지, 회의 내용, 업무 공유를 한 곳에서 관리합니다.
                    </p>
                </div>

                <a th:href="@{/projects/{projectId}/boards/write(projectId=${projectId})}"
                   class="board_write-btn">
                    + 새 글 작성
                </a>

            </section>

            <!-- 공지 -->
            <section class="board_notice" th:if="${noticeBoard != null}">

                <div class="board_notice-icon">
                    📢
                </div>

                <div class="board_notice-content">
                    <span class="board_notice-label">중요 공지</span>

                    <a th:href="@{/projects/{projectId}/boards/{boardId}(projectId=${projectId}, boardId=${noticeBoard.id})}"
                       th:attr="data-detail-url=@{/projects/{projectId}/boards/{boardId}/modal(projectId=${projectId}, boardId=${noticeBoard.id})}"
                       class="board_notice-title js-board-open"
                       th:text="${noticeBoard.title}">
                        공지 제목
                    </a>
                </div>

                <span class="board_notice-date"
                      th:text="${noticeBoard.createdAt != null ? #temporals.format(noticeBoard.createdAt, 'yyyy.MM.dd') : '-'}">
                    -
                </span>

            </section>

            <!-- 검색 / 필터 -->
            <form class="board_toolbar"
                  th:action="@{/projects/{projectId}/boards(projectId=${projectId})}"
                  method="get">

                <div class="board_search">
                    <input type="text"
                           name="keyword"
                           class="board_search-input"
                           th:value="${keyword}"
                           placeholder="게시글 제목, 작성자, 태그 검색">
                </div>

                <select name="category" class="board_select">
                    <option value="" th:selected="${category == null or category == ''}">전체 카테고리</option>
                    <option value="notice" th:selected="${category == 'notice'}">공지</option>
                    <option value="meeting" th:selected="${category == 'meeting'}">회의</option>
                    <option value="dev" th:selected="${category == 'dev'}">개발</option>
                    <option value="design" th:selected="${category == 'design'}">디자인</option>
                    <option value="plan" th:selected="${category == 'plan'}">기획</option>
                </select>

                <select name="sort" class="board_select">
                    <option value="latest" th:selected="${sort == null or sort == 'latest'}">최신순</option>
                    <option value="comments" th:selected="${sort == 'comments'}">댓글 많은 순</option>
                    <option value="views" th:selected="${sort == 'views'}">조회순</option>
                </select>

                <button type="submit" class="board_search-btn">
                    검색
                </button>

            </form>

            <!-- 게시글 목록 -->
            <section class="board_list">

                <article class="board_card"
                         th:each="board : ${boards.content}">

                    <div class="board_card-top">
                        <span class="board_badge board_badge-notice"
                              th:if="${board.notice}">
                            공지
                        </span>

                        <span class="board_badge board_badge-dev"
                              th:unless="${board.notice}">
                            게시글
                        </span>

                        <span class="board_priority board_priority-normal">
                            보통
                        </span>
                    </div>

                    <a th:href="@{/projects/{projectId}/boards/{boardId}(projectId=${projectId}, boardId=${board.id})}"
                       th:attr="data-detail-url=@{/projects/{projectId}/boards/{boardId}/modal(projectId=${projectId}, boardId=${board.id})}"
                       class="board_card-title js-board-open"
                       th:text="${board.title}">
                        게시글 제목
                    </a>

                    <p class="board_card-desc"
                       th:text="${#strings.abbreviate(board.content, 80)}">
                        게시글 내용 미리보기
                    </p>

                    <div class="board_card-meta">
                        <span th:text="'👤 ' + ${board.writerName}">👤 작성자</span>
                        <span th:text="'💬 ' + ${board.commentCount != null ? board.commentCount : 0}">💬 0</span>
                        <span th:text="'👁 ' + ${board.viewCount}">👁 0</span>
                        <span th:text="${board.createdAt != null ? '📅 ' + #temporals.format(board.createdAt, 'yyyy.MM.dd') : '📅 -'}">
                            📅 -
                        </span>
                    </div>

                </article>

                <div class="board_empty" th:if="${boards.content.isEmpty()}">
                    검색된 게시글이 없습니다.
                </div>

            </section>

            <!-- 페이지네이션 -->
            <nav class="board_pagination" th:if="${boards.totalPages > 0}">

                <a th:if="${boards.startPage > 1}"
                   th:href="@{/projects/{projectId}/boards(projectId=${projectId}, page=${boards.startPage - 2}, keyword=${keyword}, category=${category}, sort=${sort})}"
                   class="board_page-btn">
                    &lt;
                </a>

                <th:block th:each="page : ${#numbers.sequence(boards.startPage, boards.endPage)}">
                    <a th:href="@{/projects/{projectId}/boards(projectId=${projectId}, page=${page - 1}, keyword=${keyword}, category=${category}, sort=${sort})}"
                       class="board_page-btn"
                       th:classappend="${page == boards.currentPage} ? ' is-active'">
                        <span th:text="${page}">1</span>
                    </a>
                </th:block>

                <a th:if="${boards.endPage < boards.totalPages}"
                   th:href="@{/projects/{projectId}/boards(projectId=${projectId}, page=${boards.endPage}, keyword=${keyword}, category=${category}, sort=${sort})}"
                   class="board_page-btn">
                    &gt;
                </a>

            </nav>

        </main>

        <!-- 게시글 상세 모달 -->
        <div class="board-modal" id="boardDetailModal" aria-hidden="true">

            <div class="board-modal__overlay" data-modal-close></div>

            <section class="board-modal__content">

                <button type="button"
                        class="board-modal__close"
                        data-modal-close>
                    ×
                </button>

                <div class="board-modal__badges">
                    <span class="board_badge board_badge-dev" id="modalBoardType">게시글</span>
                    <span class="board_priority board_priority-normal" id="modalBoardPriority">보통</span>
                </div>

                <h2 class="board-modal__title" id="modalBoardTitle">
                    게시글 제목
                </h2>

                <div class="board-modal__meta">
                    <span id="modalBoardWriter">👤 작성자</span>
                    <span id="modalBoardDate">📅 -</span>
                    <span id="modalBoardViewCount">👁 0</span>
                    <span id="modalBoardCommentCount">💬 0</span>
                </div>

                <!-- 게시글 내용 -->
                <div class="board-modal__body" id="modalBoardContent">
                    게시글을 불러오는 중입니다.
                </div>

                <!-- 첨부파일 -->
                <section class="board-modal__files">
                    <h3 class="board-modal__section-title">첨부파일</h3>

                    <div class="board-modal__file-list" id="modalBoardFileList">
                        <div class="board-modal__file board-modal__empty">
                            첨부파일이 없습니다.
                        </div>
                    </div>
                </section>

                <!-- 댓글 -->
                <section class="board-modal__comments">
                    <h3 class="board-modal__section-title" id="modalCommentTitle">댓글 0개</h3>

                    <div class="board-modal__comment-form">
                        <textarea placeholder="댓글을 입력하세요"></textarea>
                        <button type="button">댓글 등록</button>
                    </div>

                    <div class="board-modal__comment-list" id="modalBoardCommentList">
                        <div class="board-modal__comment board-modal__empty">
                            아직 댓글이 없습니다.
                        </div>
                    </div>
                </section>

                <div class="board-modal__actions">
                    <a href="#" class="board-detail_btn board-detail_btn-sub" id="modalBoardEditLink">수정</a>

                    <form id="modalBoardDeleteForm" method="post">
                        <button type="submit"
                                class="board-detail_btn board-detail_btn-danger"
                                onclick="return confirm('게시글을 삭제할까요?');">
                            삭제
                        </button>
                    </form>
                </div>

            </section>

        </div>

    </div>
</div>

<script th:src="@{/js/projects/board-list1-modal.js}"></script>
<script th:src="@{/js/projects/board-list.js}"></script>
<script th:src="@{/js/sidebar.js}"></script>

</body>
</html>
