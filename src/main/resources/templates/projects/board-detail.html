<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Worktopus | Board-Post</title>

    <link rel="stylesheet" th:href="@{/css/chat.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/projects/board-detail.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <!-- 추가 헤더 css-->
    <link rel="stylesheet" th:href="@{/css/homeHeader.css}">
</head>

<body>
<div class="layout">

    <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

    <div class="layout__content">

        <th:block th:replace="~{fragments/header :: header}"></th:block>

        <main class="board-detail">

            <div class="board-detail_breadcrumb">
                <a th:href="@{/projects/{projectId}/boards(projectId=${projectId})}">
                    프로젝트 게시판
                </a>
                <span>/</span>
                <span>게시글 상세</span>
            </div>

            <section class="board-detail_card">

                <div class="board-detail_layout">

                    <div class="board-detail_main">

                        <div class="board-detail_top">

                            <div>
                                <div class="board-detail_badges">
                                    <!-- 공지 여부 -->
                                    <span class="board-detail_badge board-detail_badge-dev"
                                          th:if="${board.notice}">
                                        공지
                                    </span>
                                    <!-- 카테고리 -->
                                    <span class="board-detail_status"
                                          th:if="${board.category != 'NOTICE'}"
                                          th:switch="${board.category}">
                                        <span th:case="'MEETING'">회의</span>
                                        <span th:case="'WORK'">업무</span>
                                        <span th:case="'RESOURCE'">자료</span>
                                        <span th:case="'IDEA'">아이디어</span>
                                        <span th:case="'ETC'">기타</span>
                                        <span th:case="*">기타</span>
                                    </span>
                                </div>

                                <h1 class="board-detail_title"
                                    th:text="${board.title}">
                                    게시글 제목
                                </h1>

                                <div class="board-tag"
                                     th:if="${board.tag != null and !#strings.isEmpty(board.tag)}">
                                   <span th:each="tag : ${#strings.arraySplit(board.tag, ',')}"
                                         class="tag-chip"
                                         th:text="'#' + ${#strings.trim(tag)}">
                                    </span>
                                </div>

                                <div class="board-detail_meta">
                                    <span th:text="'👤 ' + ${board.writerName}">
                                        👤 작성자
                                    </span>

                                    <span th:text="${board.createdAt != null ? '📅 ' + #temporals.format(board.createdAt, 'yyyy.MM.dd HH:mm') : '📅 -'}">
                                        📅 -
                                    </span>

                                    <span th:text="'👁 조회 ' + ${board.viewCount}">
                                        👁 조회 0
                                    </span>

                                    <span>💬 댓글 0</span>
                                </div>
                            </div>

                            <div class="board-detail_actions">

                                <a      th:if="${isWriter}"
                                        th:href="@{/projects/{projectId}/boards/{boardId}/edit(
                                        projectId=${projectId},
                                        boardId=${board.id}
                                   )}"
                                   class="board-detail_btn board-detail_btn-sub">
                                    수정
                                </a>

                                <form   th:if="${canDelete}"
                                        th:action="@{/projects/{projectId}/boards/{boardId}/delete(
                                        projectId=${projectId},
                                        boardId=${board.id}
                                      )}"
                                      method="post">

                                    <button type="submit"
                                            class="board-detail_btn board-detail_btn-danger"
                                            onclick="return confirm('게시글을 삭제할까요?');">
                                        삭제
                                    </button>

                                </form>

                            </div>

                        </div>

                        <hr class="board-detail_divider">

                        <div class="board-detail_content"
                             th:utext="${board.content}">
                            게시글 내용
                        </div>

                        <section class="board-detail_files">
                            <h2 class="board-detail_section-title">
                                첨부파일
                            </h2>

                            <div class="board-detail_file"
                                th:each="file : ${board.files}">
                                <span class="board-detail_file-icon">📎</span>
                                <a class="board-detail_file-name"
                                   th:href="@{/projects/{projectId}/files/{fileId}/download(
                                       projectId=${projectId},
                                       fileId=${file.id}
                                   )}"
                                   th:text="${file.originalName}">
                                    첨부파일명
                                </a>
                            </div>

                            <div class="board-detail_file"
                                 th:if="${board.files == null or board.files.isEmpty()}">
                                <span class="board-detail_file-icon">📎</span>
                                <span class="board-detail_file-name">첨부파일이 없습니다.</span>
                            </div>
                        </section>

                    </div>

                    <aside class="board-detail_side">

                        <h2 class="board-detail_side-title">
                            게시글 정보
                        </h2>

                        <div class="board-detail_info-list">

                            <div class="board-detail_info-item">
                                <span>작성자</span>
                                <strong th:text="${board.writerName}">작성자</strong>
                            </div>

                            <div class="board-detail_info-item">
                                <span>카테고리</span>
                                <strong th:switch="${board.category}">
                                    <span th:case="'NOTICE'">공지</span>
                                    <span th:case="'MEETING'">회의</span>
                                    <span th:case="'WORK'">업무</span>
                                    <span th:case="'RESOURCE'">자료</span>
                                    <span th:case="'IDEA'">아이디어</span>
                                    <span th:case="'ETC'">기타</span>
                                    <span th:case="*" th:text="${board.category}">기타</span>
                                </strong>
                            </div>

                            <div class="board-detail_info-item">
                                <span>조회수</span>
                                <strong th:text="${board.viewCount}">0</strong>
                            </div>

                            <div class="board-detail_info-item">
                                <span>담당</span>
                                <strong th:text="${board.writerAssignedRole}">
                                    담당 미지정
                                </strong>
                            </div>

                            <div class="board-detail_info-item">
                                <span>작성일</span>
                                <strong th:text="${board.createdAt != null ? #temporals.format(board.createdAt, 'yyyy.MM.dd') : '-'}">
                                    -
                                </strong>
                            </div>

                        </div>

                    </aside>

                </div>

            </section>

            <section class="board-detail_comments">

                <h2 class="board-detail_section-title">
                    댓글
                    <span th:text="${commentCount}">0</span>개
                </h2>

                <form class="board-detail_comment-form"
                      th:action="@{/projects/{projectId}/boards/{boardId}/comments(
              projectId=${projectId},
              boardId=${board.id}
          )}"
                      method="post">

        <textarea name="content"
                  placeholder="댓글을 입력하세요."
                  maxlength="1000"
                  required></textarea>

                    <button type="submit">댓글 등록</button>
                </form>

                <div class="board-detail_comment-list">

                    <article class="board-detail_comment"
                             th:each="comment : ${comments}">

                        <div class="board-detail_comment-head">
                            <strong th:text="${comment.writerName}">
                                작성자
                            </strong>

                            <span th:text="${comment.createdAt}">
                             2026.07.20 09:00
                             </span>
                        </div>

                        <p th:id="|comment-content-${comment.id}|"
                           th:text="${comment.content}">
                            댓글 내용
                        </p>

                        <div th:if="${comment.mine}" th:id="|comment-actions-${comment.id}|" class="board-detail_comment-actions">

                            <button type="button"
                                    class="board-detail_comment-edit"
                                    th:onclick="'showCommentEdit(' + ${comment.id} + ')'">
                                수정
                            </button>

                            <form   th:if="${comment.mine}"
                                th:action="@{/projects/{projectId}/boards/{boardId}/comments/{commentId}/delete(
                                  projectId=${projectId},
                                  boardId=${board.id},
                                  commentId=${comment.id}
                              )}"
                              method="post">

                                <button type="submit"
                                    class="board-detail_comment-delete"
                                    onclick="return confirm('댓글을 삭제하시겠습니까?');">
                                    삭제
                                </button>
                            </form>
                        </div>

                  <!-- 수정 폼 -->
                <form
                    th:id="'comment-edit-' + ${comment.id}"
                    th:if="${comment.mine}"
                    th:action="@{/projects/{projectId}/boards/{boardId}/comments/{commentId}/edit(
                    projectId=${projectId},
                    boardId=${board.id},
                    commentId=${comment.id})}"
                    class="board-detail_comment-edit-form"
                    method="post"
                    style="display:none;">

                    <textarea name="content"
                              th:text="${comment.content}"
                              class="board-detail_comment-textarea">
                    </textarea>

                    <div class="board-detail_comment-edit-actions">

                    <button type="submit" class="board-detail_comment-save">저장</button>

                    <button type="button" class="board-detail_comment-cancel"
                            th:onclick="'hideCommentEdit(' + ${comment.id} + ')'">
                        취소
                    </button>
                    </div>

                </form>
            </article>

            <p th:if="${#lists.isEmpty(comments)}"
               class="board-detail_comment-empty">
                등록된 댓글이 없습니다.
            </p>

                </div>

            </section>

            <div class="board-detail_bottom">
                <a th:href="@{/projects/{projectId}/boards(projectId=${projectId})}"
                   class="board-detail_back">
                    ← 목록으로
                </a>
            </div>

        </main>

    </div>

</div>

<script th:src="@{/js/sidebar.js}"></script>
<script src="/js/header.js"></script>

<script src="/js/projects/board-detail.js"></script>

</body>
</html>
