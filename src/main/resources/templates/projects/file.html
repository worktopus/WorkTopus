<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Worktopus | Files</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/projects/file.css}">

    <!-- 추가 헤더 css-->
    <link rel="stylesheet" th:href="@{/css/homeHeader.css}">
</head>

<body>

<div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="layout__content">

        <div th:replace="~{fragments/header :: header}"></div>

        <main class="main">

            <section class="file">

                <section class="file__header">
                    <div>
                        <p class="file__label">PROJECT FILES</p>
                        <h1 class="file__title">첨부파일 모아보기</h1>
                        <p class="file__desc">
                            프로젝트 게시판에 업로드된 첨부파일을 한곳에서 확인하세요.
                        </p>
                    </div>
                </section>

                <section class="file__toolbar">
                    <div class="file__search">
                        <input type="text"
                               id="fileSearch"
                               placeholder="파일명, 게시글 제목, 작성자로 검색">
                    </div>

                    <select id="fileTypeFilter" class="file__filter">
                        <option value="all">전체 파일</option>
                        <option value="pdf">PDF</option>
                        <option value="doc">문서</option>
                        <option value="image">이미지</option>
                        <option value="zip">압축파일</option>
                    </select>
                </section>

                <section class="file__panel">

                    <div class="file__table-head">
                        <div>파일명</div>
                        <div>게시글</div>
                        <div>크기</div>
                        <div>업로드일</div>
                        <div>작성자</div>
                        <div>관리</div>
                    </div>

                    <div class="file__list" id="fileList">
                        <article class="file__row"
                                 th:each="file : ${files}"
                                 th:data-file-name="${file.originalName}"
                                 th:data-board-title="${file.boardTitle}"
                                 th:data-writer-name="${file.writerName}"
                                 th:data-file-extension="${file.fileExtension}">

                            <div class="file__name">
                                <span class="file__icon"
                                      th:text="${file.fileExtension != null and !#strings.isEmpty(file.fileExtension)
                                          ? #strings.toUpperCase(file.fileExtension)
                                          : 'FILE'}">
                                    FILE
                                </span>

                                <div>
                                    <div class="file__filename"
                                         th:text="${file.originalName}">
                                        파일명
                                    </div>
                                    <div class="file__meta"
                                         th:text="${file.fileExtension != null and !#strings.isEmpty(file.fileExtension)
                                             ? '.' + file.fileExtension
                                             : ''}">
                                        .ext
                                    </div>
                                </div>
                            </div>

                            <div class="file__board"
                                 th:text="${file.boardTitle}">
                                게시글 제목
                            </div>

                            <div class="file__text"
                                 th:text="${file.formattedFileSize()}">
                                0 B
                            </div>

                            <div class="file__text"
                                 th:text="${file.createdAt != null
                                     ? #temporals.format(file.createdAt, 'yyyy-MM-dd')
                                     : '-'}">
                                -
                            </div>

                            <div class="file__text"
                                 th:text="${file.writerName}">
                                작성자
                            </div>

                            <div class="file__actions">
                                <a class="file__button"
                                   th:href="@{/projects/{projectId}/files/{fileId}/download(
                                       projectId=${projectId},
                                       fileId=${file.fileId}
                                   )}">
                                    다운로드
                                </a>

                                <a class="file__button file__button--sub"
                                   th:href="@{/projects/{projectId}/boards/{boardId}(
                                       projectId=${projectId},
                                       boardId=${file.boardId}
                                   )}">
                                    게시글
                                </a>
                            </div>
                        </article>

                        <div class="file__empty"
                             th:if="${files == null or files.isEmpty()}">
                            등록된 첨부파일이 없습니다.
                        </div>

                        <div class="file__empty"
                             id="fileSearchEmpty"
                             hidden>
                            검색 결과가 없습니다.
                        </div>
                    </div>

                </section>

            </section>

        </main>

    </div>

</div>

<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/projects/file.js}"></script>

</body>
</html>
