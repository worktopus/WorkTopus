<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Worktopus | Kanban</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/projects/kanban.css}">

    <!-- 추가 헤더 css-->
    <link rel="stylesheet" th:href="@{/css/homeHeader.css}">

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>

<body>

<div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="layout__content">

        <div th:replace="~{fragments/header :: header}"></div>

        <main class="main">

            <section class="kanban"
                     th:data-project-id="${projectId}"
                     th:data-api-base="@{/projects/{projectId}/boards/kanban/cards(projectId=${projectId})}">

                <section class="kanban__header">
                    <div>
                        <p class="kanban__label">PROJECT BOARD</p>
                        <h1 class="kanban__title">WorkTopus 칸반보드</h1>
                        <p class="kanban__desc">
                            업무 상태를 한눈에 확인하고 진행 상황을 관리하세요.
                        </p>
                    </div>

                    <button type="button" class="kanban__add-button">
                        + 업무 추가
                    </button>
                </section>

                <section class="kanban__summary">
                    <article class="kanban__summary-card">
                        <span class="kanban__summary-label">전체 업무</span>
                        <strong id="totalTaskCount" th:text="${totalCount}">0</strong>
                    </article>

                    <article class="kanban__summary-card">
                        <span class="kanban__summary-label">진행 중</span>
                        <strong id="inProgressTaskCount" th:text="${inProgressCount}">0</strong>
                    </article>

                    <article class="kanban__summary-card">
                        <span class="kanban__summary-label">완료</span>
                        <strong id="doneTaskCount" th:text="${doneCount}">0</strong>
                    </article>
                </section>

                <section class="kanban__columns">

                    <!-- Todo -->
                    <article class="kanban__column" id="todoColumn">
                        <div class="kanban__column-header">
                            <div>
                                <h2>Todo</h2>
                                <span>시작 전 업무</span>
                            </div>
                            <strong th:text="${todoCards.size()}">0</strong>
                        </div>

                        <div class="kanban__list" id="todoList" data-status="TODO">

                            <article class="kanban__card"
                                     th:each="card : ${todoCards}"
                                     th:data-card-id="${card.id}"
                                     th:data-title="${card.title}"
                                     th:data-assignee="${card.assigneeLabel()}"
                                     th:data-due-date="${card.dueDate}"
                                     th:data-priority="${card.priority}"
                                     th:data-description="${card.descriptionLabel()}">
                                <div class="kanban__card-top">
                                    <span class="kanban__badge"
                                          th:classappend="${'kanban__badge--' + card.priorityValue()}"
                                          th:text="${card.priorityLabel()}">High</span>
                                    <button type="button" class="kanban__more">⋯</button>
                                </div>

                                <h3 class="kanban__card-title" th:text="${card.title}">업무 제목</h3>
                                <p class="kanban__card-desc" th:text="${card.descriptionLabel()}">
                                    업무 설명
                                </p>

                                <div class="kanban__tags">
                                    <span>Task</span>
                                </div>

                                <div class="kanban__card-footer">
                                    <span class="kanban__avatar" th:text="${card.assigneeInitial()}">미정</span>
                                    <span class="kanban__date" th:text="${card.dueDateLabel()}">마감일 없음</span>
                                </div>

                                <div class="kanban-menu">
                                    <button type="button" class="kanban-menu__button" data-action="edit">
                                        수정
                                    </button>
                                    <button type="button" class="kanban-menu__button kanban-menu__button--danger" data-action="delete">
                                        삭제
                                    </button>
                                </div>
                            </article>

                        </div>
                    </article>

                    <!-- In Progress -->
                    <article class="kanban__column">
                        <div class="kanban__column-header">
                            <div>
                                <h2>In Progress</h2>
                                <span>진행 중</span>
                            </div>
                            <strong th:text="${inProgressCards.size()}">0</strong>
                        </div>

                        <div class="kanban__list" data-status="IN_PROGRESS">
                            <article class="kanban__card"
                                     th:each="card : ${inProgressCards}"
                                     th:data-card-id="${card.id}"
                                     th:data-title="${card.title}"
                                     th:data-assignee="${card.assigneeLabel()}"
                                     th:data-due-date="${card.dueDate}"
                                     th:data-priority="${card.priority}"
                                     th:data-description="${card.descriptionLabel()}">
                                <div class="kanban__card-top">
                                    <span class="kanban__badge"
                                          th:classappend="${'kanban__badge--' + card.priorityValue()}"
                                          th:text="${card.priorityLabel()}">High</span>
                                    <button type="button" class="kanban__more">⋯</button>
                                </div>

                                <h3 class="kanban__card-title" th:text="${card.title}">업무 제목</h3>
                                <p class="kanban__card-desc" th:text="${card.descriptionLabel()}">
                                    업무 설명
                                </p>

                                <div class="kanban__tags">
                                    <span>Task</span>
                                </div>

                                <div class="kanban__card-footer">
                                    <span class="kanban__avatar" th:text="${card.assigneeInitial()}">미정</span>
                                    <span class="kanban__date" th:text="${card.dueDateLabel()}">마감일 없음</span>
                                </div>

                                <div class="kanban-menu">
                                    <button type="button" class="kanban-menu__button" data-action="edit">
                                        수정
                                    </button>
                                    <button type="button" class="kanban-menu__button kanban-menu__button--danger" data-action="delete">
                                        삭제
                                    </button>
                                </div>
                            </article>
                        </div>
                    </article>

                    <!-- Review -->
                    <article class="kanban__column">
                        <div class="kanban__column-header">
                            <div>
                                <h2>Review</h2>
                                <span>검토 필요</span>
                            </div>
                            <strong th:text="${reviewCards.size()}">0</strong>
                        </div>

                        <div class="kanban__list" data-status="REVIEW">
                            <article class="kanban__card"
                                     th:each="card : ${reviewCards}"
                                     th:data-card-id="${card.id}"
                                     th:data-title="${card.title}"
                                     th:data-assignee="${card.assigneeLabel()}"
                                     th:data-due-date="${card.dueDate}"
                                     th:data-priority="${card.priority}"
                                     th:data-description="${card.descriptionLabel()}">
                                <div class="kanban__card-top">
                                    <span class="kanban__badge"
                                          th:classappend="${'kanban__badge--' + card.priorityValue()}"
                                          th:text="${card.priorityLabel()}">Low</span>
                                    <button type="button" class="kanban__more">⋯</button>
                                </div>

                                <h3 class="kanban__card-title" th:text="${card.title}">업무 제목</h3>
                                <p class="kanban__card-desc" th:text="${card.descriptionLabel()}">
                                    업무 설명
                                </p>

                                <div class="kanban__tags">
                                    <span>Task</span>
                                </div>

                                <div class="kanban__card-footer">
                                    <span class="kanban__avatar" th:text="${card.assigneeInitial()}">미정</span>
                                    <span class="kanban__date" th:text="${card.dueDateLabel()}">마감일 없음</span>
                                </div>

                                <div class="kanban-menu">
                                    <button type="button" class="kanban-menu__button" data-action="edit">
                                        수정
                                    </button>
                                    <button type="button" class="kanban-menu__button kanban-menu__button--danger" data-action="delete">
                                        삭제
                                    </button>
                                </div>
                            </article>
                        </div>
                    </article>

                    <!-- Done -->
                    <article class="kanban__column">
                        <div class="kanban__column-header">
                            <div>
                                <h2>Done</h2>
                                <span>완료</span>
                            </div>
                            <strong th:text="${doneCards.size()}">0</strong>
                        </div>

                        <div class="kanban__list" data-status="DONE">
                            <article class="kanban__card"
                                     th:each="card : ${doneCards}"
                                     th:data-card-id="${card.id}"
                                     th:data-title="${card.title}"
                                     th:data-assignee="${card.assigneeLabel()}"
                                     th:data-due-date="${card.dueDate}"
                                     th:data-priority="${card.priority}"
                                     th:data-description="${card.descriptionLabel()}">
                                <div class="kanban__card-top">
                                    <span class="kanban__badge"
                                          th:classappend="${'kanban__badge--' + card.priorityValue()}"
                                          th:text="${card.priorityLabel()}">Done</span>
                                    <button type="button" class="kanban__more">⋯</button>
                                </div>

                                <h3 class="kanban__card-title" th:text="${card.title}">업무 제목</h3>
                                <p class="kanban__card-desc" th:text="${card.descriptionLabel()}">
                                    업무 설명
                                </p>

                                <div class="kanban__tags">
                                    <span>Task</span>
                                </div>

                                <div class="kanban__card-footer">
                                    <span class="kanban__avatar" th:text="${card.assigneeInitial()}">미정</span>
                                    <span class="kanban__date" th:text="${card.dueDateLabel()}">마감일 없음</span>
                                </div>

                                <div class="kanban-menu">
                                    <button type="button" class="kanban-menu__button" data-action="edit">
                                        수정
                                    </button>
                                    <button type="button" class="kanban-menu__button kanban-menu__button--danger" data-action="delete">
                                        삭제
                                    </button>
                                </div>
                            </article>
                        </div>
                    </article>

                </section>

            </section>

            <!-- Task Modal -->
            <div class="kanban-modal" id="taskModal">

                <div class="kanban-modal__overlay"></div>

                <div class="kanban-modal__content">

                    <div class="kanban-modal__header">
                        <h2>업무 추가</h2>

                        <button type="button"
                                class="kanban-modal__close"
                                id="modalClose">
                            ✕
                        </button>
                    </div>

                    <form id="taskForm">

                        <div class="kanban-modal__group">
                            <label>제목</label>
                            <input type="text" id="taskTitle" required>
                        </div>

                        <div class="kanban-modal__group">
                            <label>담당자</label>
                            <input type="text" id="taskUser">
                        </div>

                        <div class="kanban-modal__group">
                            <label>우선순위</label>
                            <select id="taskPriority">
                                <option value="high">High</option>
                                <option value="medium">Medium</option>
                                <option value="low">Low</option>
                            </select>
                        </div>

                        <div class="kanban-modal__group">
                            <label>마감일</label>
                            <input type="date" id="taskDate">
                        </div>

                        <div class="kanban-modal__group">
                            <label>설명</label>
                            <textarea rows="4" id="taskDesc"></textarea>
                        </div>

                        <button class="kanban-modal__submit" type="submit">
                            저장
                        </button>

                    </form>

                </div>

            </div>

        </main>

    </div>

</div>

<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/projects/kanban.js}"></script>

</body>
</html>
