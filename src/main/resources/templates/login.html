<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>login</title>
    <style>
        /* 1. 기본 초기화 및 배경 설정 (목업의 연한 회색 배경 느낌) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: #f4f7fc; /* 목업의 대시보드 배경색과 유사한 부드러운 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 2. 로그인 카드 박스 (대시보드 위젯 스타일 반영) */
        .box {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 16px; /* 목업 특유의 둥근 모서리 */
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.1); /* 은은하고 부드러운 그림자 */
            text-align: center;
        }

        /* 3. 타이틀 및 텍스트 */
        h1 {
            font-size: 24px;
            color: #1e293b;
            font-weight: 700;
            margin-bottom: 24px;
        }

        /* 메시지 스타일 알림 (진행도 색상 계열인 블루 반영) */
        .msg {
            background-color: #edf2ff;
            color: #3b5bdb;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        /* 에러 메시지 스타일 (대시보드 차트의 레드/오렌지 계열 반영) */
        .error {
            background-color: #fff5f5;
            color: #e03131;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        /* 4. 폼 및 입력창 (정렬 및 스타일링) */
        form {
            display: flex;
            flex-direction: column;
            gap: 16px; /* 입력창 간격 */
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 14px;
            color: #475569;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background-color: #f8fafc;
            color: #334155;
            transition: all 0.2s ease;
            outline: none;
        }

        input::placeholder {
            color: #94a3b8;
        }

        /* 포커스 되었을 때 목업의 메인 블루 컬러로 하이라이트 */
        input:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        /* 5. 로그인 버튼 (목업의 메인 진행도 바 색상 반영) */
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #2563eb; /* 목업의 메인 블루 테마 */
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 8px;
        }

        button[type="submit"]:hover {
            background-color: #1d4ed8;
        }

        button[type="submit"]:active {
            background-color: #1e40af;
        }

        /* 6. 하단 링크 (회원가입 | 홈으로) */
        p:last-child {
            font-size: 14px;
            color: #94a3b8;
        }

        p a {
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s ease;
            margin: 0 4px;
        }

        p a:hover {
            color: #2563eb; /* 호버 시 블루 강조 */
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>로그인</h1>
        <p class="msg" th:if="${msg}" th:text="${msg}">[[${msg}]]</p>
        <p class="error" th:if="${param.error}">아이디 또는 비밀번호가 올바르지 않습니다</p>
        <p class="msg" th:if="${param.logout}">로그아웃되었습니다</p>

        <form th:action="@{/login}" method="post">
            <label>아이디
            <input type="text" name="username" placeholder="admin" autofocus required>
            </label>
            <label>비밀번호
            <input type="password" name="password" placeholder="admin1234" required>
            </label>
            <button type="submit">로그인</button>
        </form>

        <p>
            <a href="@{/members/register}">회원가입</a> |
            <a href="/index.html">홈으로</a>
        </p>
    </div>
</body>
</html>
