<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>프로젝트 생성</title>

    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/project-create.css">
</head>
<body>
<div class="project-create-page">

    <header class="project-create-header">
        <a href="/projects" class="project-create-logo">
            <img src="/images/logo.png" alt="WorkTopus logo" class="project-create-logo-img">
            <span class="project-create-logo-text">WorkTopus</span>
        </a>

        <a href="/projects" class="project-create-back">← 프로젝트 목록</a>
    </header>

    <main class="project-create-main">
        <section class="project-create-card">
            <p class="project-create-label">Workspace</p>

            <h1 class="project-create-title">새 프로젝트 만들기</h1>

            <p class="project-create-desc">
                프로젝트 이름과 설명을 입력하여 팀 협업 공간을 만들어보세요.
            </p>

            <form class="project-create-form" action="/projects" method="post">
                <label class="project-create-label-text" for="projectName">프로젝트 이름</label>
                <input
                        class="project-create-input"
                        id="projectName"
                        name="projectName"
                        type="text"
                        placeholder="예) WorkTopus"
                        required
                >

                <label class="project-create-label-text" for="projectDesc">프로젝트 설명</label>
                <textarea
                        class="project-create-textarea"
                        id="projectDesc"
                        name="projectDesc"
                        placeholder="프로젝트에 대한 간단한 설명을 입력하세요."
                ></textarea>

                <div class="project-create-buttons">
                    <a href="/projects" class="project-create-cancel">취소</a>
                    <button type="submit" class="project-create-submit">프로젝트 생성</button>
                </div>
            </form>
        </section>
    </main>

</div>
</body>
</html>
