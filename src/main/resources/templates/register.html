<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/register.css">
</head>
<body>
<div class="register-page">
    <div class="register-card">
        <a href="/index.html" class="register-logo">
            <img src="/images/logo.png" alt="WorkTopus logo" class="register-logo-img">
            <span class="register-logo-text">WorkTopus</span>
        </a>

        <h1 class="register-title">회원가입</h1>
        <p class="register-desc">WorkTopus에서 팀 프로젝트를 시작하세요.</p>

        <form th:action="@{/members/register}" method="post" th:object="${memberForm}" class="register-form">
            <div class="register-error" th:if="${#fields.hasGlobalErrors()}"
                 th:each="err : ${#fields.globalErrors()}"
                 th:text="${err}"></div>

            <label class="register-label" for="username">아이디</label>
            <input class="register-input" type="text" th:field="*{username}" id="username" placeholder="4자 이상" required>
            <span class="register-error-text" th:errors="*{username}"></span>

            <label class="register-label" for="password">비밀번호</label>
            <input class="register-input" type="password" th:field="*{password}" id="password" placeholder="4자 이상" required>
            <span class="register-error-text" th:errors="*{password}"></span>

            <label class="register-label" for="name">이름</label>
            <input class="register-input" type="text" th:field="*{name}" id="name" placeholder="최대 30자" required>
            <span class="register-error-text" th:errors="*{name}"></span>

            <label class="register-label" for="email">이메일</label>
            <input class="register-input" type="email" th:field="*{email}" id="email" placeholder="example@email.com" required>
            <span class="register-error-text" th:errors="*{email}"></span>

            <button class="register-submit" type="submit">가입하기</button>
        </form>

        <div class="register-links">
            <a href="/login" class="register-link">로그인으로</a>
            <span class="register-link-bar">|</span>
            <a href="/index.html" class="register-link">홈으로</a>
        </div>
    </div>
</div>
</body>
</html>
