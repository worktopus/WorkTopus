<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI Collaboration</title>

    <style>
        /* 팝업 기본 숨김 */
        #chatModal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 500px;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        /* 상단 탭 */
        .tab {
            display: flex;
            border-bottom: 1px solid #ddd;
        }

        .tab button {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border: none;
            background: #f5f5f5;
        }

        .tab button.active {
            background: #ddd;
        }

        /* 채팅 영역 */
        .content {
            padding: 10px;
            height: 380px;
            overflow-y: auto;
        }

        /* 입력 영역 */
        .inputBox {
            display: flex;
            border-top: 1px solid #ddd;
        }

        .inputBox input {
            flex: 1;
            padding: 10px;
        }

        .inputBox button {
            width: 80px;
        }
    </style>
</head>

<body>

<h1>AI Collaboration</h1>

<!-- 💬 채팅 버튼 버튼모양싫으면 span 으로 감싸기 -->
<button onclick="openChat()">💬 채팅</button>

<!-- 채팅 팝업 -->
<div id="chatModal">

    <!-- 탭 -->
    <div class="tab">
        <button onclick="switchTab('group')" class="active">단체 채팅</button>
        <button onclick="switchTab('private')">개인 채팅</button>
        <button onclick="closeChat()" style="flex: 0 0 40px; background: #ff4d4d; color: white; font-weight: bold;">X</button>
    </div>

    <!-- 내용 -->
    <div class="content">
        <div id="groupChat">
            <div id="messageArea">

            </div>
        </div>

        <div id="privateChat" style="display:none;">

            <div style="display:flex;height:100%;">

                <!-- 팀원 목록 -->
                <div id="userList"
                     style="width:180px; border-right:1px solid #ddd; overflow:auto;">

                </div>

                <!-- 개인채팅 -->
                <div style="flex:1; padding:10px;">
                    <div id="privateMessageArea">
                        팀원을 선택하세요.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 입력 -->
    <div class="inputBox">
        <input  id          = "message"
                type        = "text"
                placeholder = "메시지를 입력하세요">

        <button id="sendBtn">
            전송
        </button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script src="/js/chat/websocket.js"></script>
<script src="/js/chat/member.js"></script>
<script src="/js/chat/groupChat.js"></script>
<script src="/js/chat/privateChat.js"></script>
<script src="/js/chat/history.js"></script>
<script src="/js/chat/chat.js"></script>
</body>
</html>
